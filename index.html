}

Object.assign(window, { Sidebar, NAV_GROUPS, CompanySwitcher, NavParent });

</script>

<script type="text/babel">
/* SCREEN 2 — Google Search Ad Writer (HERO). Google-Ads "create your ads" feel:
   accordion asset sections (Headlines / Descriptions / URL / Sitelinks…), ad-strength meter,
   collapsible/minimizable ads, created + go-live dates, live preview with format carousel. */

/* ----- editable copy row ----- */
function CopyRow({ idx, prefix, item, limit, onText, onPin, onRemove, multiline }) {
  const len = item.text.length;
  const pinned = item.pin != null;
  const bad = isGibberish(item.text);
  return (
    <div style={{ display: "flex", alignItems: multiline ? "flex-start" : "center", gap: 9, padding: "5px 6px",
      borderRadius: 8, background: pinned ? "var(--gold-tint)" : "transparent", boxShadow: pinned ? "inset 0 0 0 1px var(--gold-soft)" : "none" }}>
      <span style={{ fontFamily: "var(--mono)", fontSize: 11, color: "var(--ink-faint)", width: 28, flexShrink: 0, fontWeight: 500, paddingTop: multiline ? 9 : 0 }}>{prefix}{idx + 1}</span>
      <button title={pinned ? `Pinned to position ${item.pin}` : "Pin position"} onClick={() => onPin(idx)}
        style={{ flexShrink: 0, border: "none", background: pinned ? "var(--gold)" : "#eef0f3", width: 26, height: 26, borderRadius: 7,
          display: "flex", alignItems: "center", justifyContent: "center", color: pinned ? "var(--navy-900)" : "var(--ink-faint)", marginTop: multiline ? 6 : 0,
          boxShadow: pinned ? "0 1px 4px rgba(200,169,81,.4)" : "none" }}>
        <Icon name="pin" size={13} fill={pinned} />
      </button>
      {multiline
        ? <textarea className="input" rows={2} value={item.text} onChange={e => onText(idx, e.target.value)} style={{ resize: "vertical", lineHeight: 1.45, fontSize: 13, minHeight: 50, borderColor: bad ? "var(--red)" : undefined, boxShadow: bad ? "0 0 0 3px rgba(210,59,59,.08)" : undefined }} />
        : <input className="input" value={item.text} onChange={e => onText(idx, e.target.value)} style={{ fontSize: 13, borderColor: bad ? "var(--red)" : undefined, boxShadow: bad ? "0 0 0 3px rgba(210,59,59,.08)" : undefined }} />}
      {bad && <span title="This doesn't read as real ad copy — Google will score it Poor. Rewrite with a clear benefit." style={{ flexShrink: 0, display: "inline-flex", alignItems: "center", gap: 3, color: "var(--red)", background: "var(--red-bg)", borderRadius: 6, padding: "2px 6px", fontSize: 10.5, fontWeight: 700, marginTop: multiline ? 9 : 0, whiteSpace: "nowrap" }}><Icon name="info" size={11} /> unclear</span>}
      <span style={{ flexShrink: 0, marginTop: multiline ? 9 : 0 }}><CharPill len={len} limit={limit} /></span>
      {pinned && <span style={{ flexShrink: 0, fontFamily: "var(--mono)", fontSize: 10, fontWeight: 600, color: "var(--gold)", background: "#fff", border: "1px solid var(--gold-soft)", borderRadius: 5, padding: "2px 5px", marginTop: multiline ? 8 : 0 }}>PIN {item.pin}</span>}
      <button title="Remove" onClick={() => onRemove(idx)} className="rowdel" style={{ flexShrink: 0, border: "none", background: "none", color: "var(--ink-faint)", cursor: "pointer", padding: 2, marginTop: multiline ? 8 : 0 }}><Icon name="trash" size={14} /></button>
    </div>
  );
}

function orderForPreview(items, slots) {
  const filled = items.filter(x => x.text.trim());
  const pinned = filled.filter(x => x.pin); const rest = filled.filter(x => !x.pin);
  const out = []; const used = new Set();
  for (let pos = 1; pos <= slots; pos++) {
    const p = pinned.find(x => x.pin === pos && !used.has(x));
    if (p) { out.push(p); used.add(p); } else { const u = rest.find(x => !used.has(x)); if (u) { out.push(u); used.add(u); } }
  }
  return out;
}
function togglePin(list, i, max) {
  const item = list[i];
  if (item.pin != null) { item.pin = null; return; }
  const used = list.filter(x => x.pin).map(x => x.pin);
  for (let p = 1; p <= max; p++) if (!used.includes(p)) { item.pin = p; return; }
  window.__pinWarn && window.__pinWarn(max);
}

/* ----- Google preview (desktop + mobile) ----- */
function GooglePreview({ ad, domain, mobile, sel }) {
  const host = domain || "shriramcredit.com";
  const path = [ad.path1, ad.path2].filter(Boolean).join("/");
  const hls = pickedItems(ad, sel, 3, orderForPreview).slice(0, mobile ? 2 : 3);
  const descs = pickedItems(ad, sel, 4, orderForPreview).slice(0, mobile ? 1 : 2);
  return (
    <div style={{ fontFamily: "arial, sans-serif", color: "#202124", lineHeight: 1.4 }}>
      <div style={{ fontWeight: 700, fontSize: 12, marginBottom: 6 }}>Sponsored</div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
        <div style={{ width: 26, height: 26, borderRadius: "50%", background: "#1A2B4A", color: "#C8A951", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 13, flexShrink: 0 }}>S</div>
        <div style={{ lineHeight: 1.2, minWidth: 0 }}>
          <div style={{ fontSize: 13.5, color: "#202124", fontWeight: 500 }}>Shriram</div>
          <div style={{ fontSize: 12, color: "#5f6368", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{host}{path ? " › " + path : ""}</div>
        </div>
      </div>
      <div style={{ fontSize: mobile ? 17 : 20, lineHeight: 1.3, color: "#1a0dab", marginTop: 4 }}>
        {hls.length ? hls.map((h, i) => (<span key={i}><span>{h.text}</span>{i < hls.length - 1 && <span style={{ color: "#5f6368" }}>{" | "}</span>}</span>)) : <span style={{ color: "#9aa0a6" }}>Your headlines appear here…</span>}
      </div>
      <div style={{ fontSize: mobile ? 13 : 14, color: "#4d5156", marginTop: 5 }}>{descs.map(d => d.text).join(" ") || "Your descriptions appear here…"}</div>
      {!mobile && (
        <div style={{ display: "flex", gap: 18, marginTop: 11, flexWrap: "wrap" }}>
          {window.LAMF_DATA.sitelinks.slice(0, 4).map((s, i) => (
            <div key={i} style={{ minWidth: 120 }}><div style={{ color: "#1a0dab", fontSize: 14 }}>{s[0]}</div><div style={{ color: "#4d5156", fontSize: 12, lineHeight: 1.3 }}>{s[1]}</div></div>
          ))}
        </div>
      )}
      {mobile && <button style={{ marginTop: 10, width: "100%", border: "1px solid #1a73e8", color: "#1a73e8", background: "#fff", borderRadius: 18, padding: "8px 0", fontWeight: 600, fontSize: 13 }}>Apply Now</button>}
    </div>
  );
}

function PhoneFrame({ children, width = 270 }) {
  return (
    <div style={{ width, margin: "0 auto", border: "10px solid #1c2531", borderRadius: 32, background: "#fff", boxShadow: "var(--shadow-md)", overflow: "hidden" }}>
      <div style={{ height: 26, background: "#1c2531", display: "flex", justifyContent: "center", alignItems: "flex-start" }}>
        <div style={{ width: 64, height: 5, background: "#3a4456", borderRadius: 5, marginTop: 5 }}></div>
      </div>
      <div style={{ padding: "12px 13px 16px" }}>{children}</div>
    </div>
  );
}

/* ----- one collapsible ad (Google-Ads accordion of asset sections) ----- */
function GoogleAd({ adKey, ad, domain, limits, edit, open, onToggle, active, onActivate, onRemove, label }) {
  const D = window.LAMF_DATA;
  const [sec, setSec] = useState({ headlines: true, descriptions: true, url: false });
  const toggleSec = k => setSec(s => ({ ...s, [k]: !s[k] }));
  const filledHL = ad.headlines.filter(h => h.text.trim()).length;
  const filledD = ad.descriptions.filter(d => d.text.trim()).length;
  const overHL = ad.headlines.filter(h => h.text.length > limits.headline).length;
  const overD = ad.descriptions.filter(d => d.text.length > limits.description).length;
  const over = overHL + overD;
  const str = adStrength(ad);

  return (
    <div className="card" style={{ marginBottom: 14, overflow: "hidden", boxShadow: active ? "0 0 0 2px var(--gold)" : "var(--shadow-sm)" }}>
      <div onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", cursor: "pointer", background: open ? "#fbfbfc" : "#fff", borderBottom: open ? "1px solid var(--line)" : "none" }}>
        <Icon name="chevron" size={16} style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform .15s", color: "var(--ink-soft)", flexShrink: 0 }} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: "var(--navy)", display: "flex", alignItems: "center", gap: 8 }}>
            {label}
            {active && <span style={{ fontSize: 10, fontWeight: 700, color: "var(--gold)", background: "var(--gold-tint)", border: "1px solid var(--gold-soft)", borderRadius: 5, padding: "1px 6px" }}>PREVIEWING</span>}
            <span style={{ fontSize: 11, fontWeight: 700, color: str.color }}>· {str.label}</span>
          </div>
          <div style={{ fontSize: 12, color: "var(--ink-faint)", marginTop: 1 }}>{filledHL} headlines · {filledD} descriptions</div>
        </div>
        {over > 0 && <span className="pill pill-red" style={{ flexShrink: 0 }}>{over} over limit</span>}
        {!active && <button className="btn btn-sm btn-ghost" onClick={e => { e.stopPropagation(); onActivate(); }}><Icon name="eye" size={13} /> Preview</button>}
        {onRemove && <button className="btn btn-sm btn-ghost" onClick={e => { e.stopPropagation(); onRemove(); }} title="Remove ad"><Icon name="trash" size={14} /></button>}
      </div>
      {open && (
        <div style={{ padding: 14 }} onClick={() => { if (!active) onActivate(); }}>
          <AdStrengthBar ad={ad} />

          {/* Headlines section */}
          <Accordion icon="edit" title="Headlines" badge={`${filledHL}/15`} complete={filledHL >= 5}
            meta="Add up to 15. Pin 1=intent · Pin 2=brand+rate · Pin 3=CTA" open={sec.headlines} onToggle={() => toggleSec("headlines")}>
            {ad.headlines.map((h, i) => (
              <CopyRow key={i} idx={i} prefix="HL" item={h} limit={limits.headline}
                onText={(j, t) => edit(a => { a.headlines[j].text = t; })}
                onPin={(j) => edit(a => togglePin(a.headlines, j, 3))}
                onRemove={(j) => edit(a => { a.headlines.splice(j, 1); })} />
            ))}
            {ad.headlines.length < 15 && <button className="btn btn-sm btn-ghost" style={{ marginTop: 4 }} onClick={() => edit(a => { a.headlines.push({ text: "", pin: null }); })}><Icon name="plus" size={13} /> Add headline</button>}
          </Accordion>

          {/* Descriptions section */}
          <Accordion icon="doc" title="Descriptions" badge={`${filledD}/4`} complete={filledD >= 2}
            meta="Add up to 4. Pin 1=rate reframe · Pin 2=trust + CTA" open={sec.descriptions} onToggle={() => toggleSec("descriptions")}>
            {ad.descriptions.map((d, i) => (
              <CopyRow key={i} idx={i} prefix="D" item={d} limit={limits.description} multiline
                onText={(j, t) => edit(a => { a.descriptions[j].text = t; })}
                onPin={(j) => edit(a => togglePin(a.descriptions, j, 2))}
                onRemove={(j) => edit(a => { a.descriptions.splice(j, 1); })} />
            ))}
            {ad.descriptions.length < 4 && <button className="btn btn-sm btn-ghost" style={{ marginTop: 4 }} onClick={() => edit(a => { a.descriptions.push({ text: "", pin: null }); })}><Icon name="plus" size={13} /> Add description</button>}
          </Accordion>

          {/* Display URL paths */}
          <Accordion icon="plug" title="Display path" meta={`${domain}/${ad.path1 || "path1"}/${ad.path2 || "path2"}`} open={sec.url} onToggle={() => toggleSec("url")}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, paddingTop: 4 }}>
              <div><label className="field-label">Path 1 (≤15)</label><div style={{ display: "flex", gap: 8, alignItems: "center" }}><input className="input" maxLength={15} value={ad.path1} onChange={e => edit(a => { a.path1 = e.target.value; })} /><CharPill len={ad.path1.length} limit={15} /></div></div>
              <div><label className="field-label">Path 2 (≤15)</label><div style={{ display: "flex", gap: 8, alignItems: "center" }}><input className="input" maxLength={15} value={ad.path2} onChange={e => edit(a => { a.path2 = e.target.value; })} /><CharPill len={ad.path2.length} limit={15} /></div></div>
            </div>
          </Accordion>
        </div>
      )}
    </div>
  );
}

/* ----- new campaign modal ----- */
function NewCampaignModal({ company, onClose, onCreate, kind = "Search" }) {
  const D = window.LAMF_DATA;
  const co = D.companyById(company === "all" ? "sccl" : company);
  const [f, setF] = useState({ name: "", type: kind, adGroup: "", theme: "", keywords: "", match: "Phrase", path1: "", path2: "", created: LAMF_TODAY(), golive: "" });
  const set = (k, v) => setF(s => ({ ...s, [k]: v }));
  const kwList = f.keywords.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  const create = () => {
    if (!f.name.trim()) return;
    onCreate({
      id: "c-" + Date.now(), company: co.id, name: f.name.trim(), type: f.type, adGroup: f.adGroup || "New Ad Group",
      account: co.name + " — " + f.type, theme: f.theme || "—", audience: "—", domain: co.domain, platform: "Google " + f.type,
      keywords: kwList, keywordMatch: f.match,
      finalUrl: `https://www.${co.domain}/`, path1: f.path1, path2: f.path2, status: "Not Started", priority: "Medium",
      created: f.created, golive: f.golive,
      headlines: Array.from({ length: 5 }, () => ({ text: "", pin: null })),
      descriptions: Array.from({ length: 2 }, () => ({ text: "", pin: null })),
    });
  };
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(20,29,53,.5)", zIndex: 500, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div onClick={e => e.stopPropagation()} className="card" style={{ width: 560, maxWidth: "100%", padding: 22, boxShadow: "var(--shadow-lg)", maxHeight: "92vh", overflowY: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 4 }}>
          <span style={{ width: 10, height: 10, borderRadius: 3, background: co.accent }}></span>
          <span style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: "var(--ink-faint)" }}>{co.name}</span>
        </div>
        <div style={{ fontSize: 18, fontWeight: 700, color: "var(--navy)", marginBottom: 16 }}>New Campaign</div>

        {/* campaign type selector — Google Ads style */}
        <label className="field-label">Campaign type</label>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(150px,1fr))", gap: 8, marginBottom: 16 }}>
          {D.campaignTypes.map(t => {
            const on = f.type === t.id;
            return (
              <button key={t.id} onClick={() => set("type", t.id)} style={{ textAlign: "left", border: `1.5px solid ${on ? "var(--navy)" : "var(--line-strong)"}`, background: on ? "#f5f8ff" : "#fff", borderRadius: 10, padding: "10px 11px", cursor: "pointer" }}>
                <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ width: 26, height: 26, borderRadius: 7, background: on ? "var(--navy)" : "#eef1f6", color: on ? "#fff" : "var(--navy)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name={t.icon} size={14} /></span>
                  <span style={{ fontWeight: 700, fontSize: 12.5, color: "var(--navy)" }}>{t.id}</span>
                  {on && <Icon name="check" size={14} style={{ color: "var(--navy)", marginLeft: "auto" }} />}
                </span>
                <div style={{ fontSize: 10.5, color: "var(--ink-faint)", marginTop: 5, lineHeight: 1.35 }}>{t.desc}</div>
              </button>
            );
          })}
        </div>

        <div style={{ display: "grid", gap: 12 }}>
          <div><label className="field-label">Campaign name</label><input className="input" autoFocus value={f.name} onChange={e => set("name", e.target.value)} placeholder="e.g. Festive Rate Offer" /></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div><label className="field-label">Ad group</label><input className="input" value={f.adGroup} onChange={e => set("adGroup", e.target.value)} placeholder="Ad group" /></div>
            <div><label className="field-label">Theme / Intent</label><input className="input" value={f.theme} onChange={e => set("theme", e.target.value)} placeholder="Theme" /></div>
          </div>

          {/* keywords — Task 7 */}
          <div style={{ background: "#fbfaf6", border: "1px solid var(--gold-soft)", borderRadius: 10, padding: "12px 13px" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
              <label className="field-label" style={{ margin: 0 }}>Keywords <span style={{ textTransform: "none", fontWeight: 500, color: "var(--ink-faint)" }}>· seed the ad copy &amp; AI generation</span></label>
              <select className="select" style={{ width: "auto", fontSize: 11.5, padding: "3px 22px 3px 8px" }} value={f.match} onChange={e => set("match", e.target.value)}>
                {D.keywordMatchTypes.map(m => <option key={m}>{m}</option>)}
              </select>
            </div>
            <textarea className="input" rows={2} value={f.keywords} onChange={e => set("keywords", e.target.value)} placeholder={"One per line or comma-separated\ne.g. personal loan, instant cash, loan against mutual funds"} style={{ resize: "vertical", fontSize: 13 }} />
            {kwList.length > 0 && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
                {kwList.map((k, i) => <span key={i} style={{ fontSize: 11, color: "#7a6526", background: "var(--gold-tint)", border: "1px solid var(--gold-soft)", borderRadius: 20, padding: "2px 9px" }}>{f.match === "Exact" ? `[${k}]` : f.match === "Phrase" ? `"${k}"` : k}</span>)}
              </div>
            )}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div><label className="field-label">Created date</label><input type="date" className="input" value={f.created} onChange={e => set("created", e.target.value)} /></div>
            <div><label className="field-label">Go-live date</label><input type="date" className="input" value={f.golive} onChange={e => set("golive", e.target.value)} /></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div><label className="field-label">Path 1</label><input className="input" maxLength={15} value={f.path1} onChange={e => set("path1", e.target.value)} placeholder="lamf" /></div>
            <div><label className="field-label">Path 2</label><input className="input" maxLength={15} value={f.path2} onChange={e => set("path2", e.target.value)} placeholder="apply" /></div>
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 9, marginTop: 20 }}>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={create} disabled={!f.name.trim()} style={!f.name.trim() ? { opacity: .5 } : {}}><Icon name="plus" size={14} /> Create campaign</button>
        </div>
      </div>
    </div>
  );
}

/* ----- campaign meta strip (dates + status) ----- */
function CampaignDates({ camp, edit }) {
  return (
    <div style={{ display: "flex", gap: 18, alignItems: "center", flexWrap: "wrap", marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--line)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
        <span className="field-label" style={{ margin: 0 }}>Created</span>
        <input type="date" className="input" style={{ width: "auto", fontSize: 12.5, padding: "5px 8px" }} value={camp.created || ""} onChange={e => edit(c => { c.created = e.target.value; })} />
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
        <span className="field-label" style={{ margin: 0 }}>Go-live</span>
        <input type="date" className="input" style={{ width: "auto", fontSize: 12.5, padding: "5px 8px" }} value={camp.golive || ""} onChange={e => edit(c => { c.golive = e.target.value; })} />
      </div>
    </div>
  );
}

function GoogleSearchScreen({ store }) {
  const D = window.LAMF_DATA;
  const toast = useToast();
  window.__pinWarn = (max) => toast(`All ${max} pins for this set are in use — unpin one first`, "warn");
  const [campId, setCampId] = store.useCampaign();
  const list = store.companyCampaigns(store.activeCompany);
  useEffect(() => { if (!list.find(c => c.id === campId) && list.length) setCampId(list[0].id); }, [store.activeCompany, list.length]);
  const camp = list.find(c => c.id === campId) || list[0];
  const [openAds, setOpenAds] = useState({ main: true });
  const [activeAd, setActiveAd] = useState("main");
  const [showNew, setShowNew] = useState(false);
  const [pview, setPview] = useState("desktop");
  const [sel, setSel] = useState({ auto: true });
  useEffect(() => { setSel({ auto: true }); }, [campId, activeAd]);

  if (!camp) return <div style={{ padding: 40 }} className="empty-tip">No campaigns for this company yet.</div>;

  const editAd = (adKey, fn) => store.editCampaign(camp.id, c => { fn(adKey === "main" ? c : c.variations[adKey]); });
  const editField = (fn) => store.editCampaign(camp.id, fn);
  const getAd = (adKey) => adKey === "main" ? camp : (camp.variations || [])[adKey];
  const previewAd = getAd(activeAd) || camp;
  const co = D.companyById(camp.company);
  const adCount = 1 + (camp.variations ? camp.variations.length : 0);
  const ctx = { name: co.name, short: co.short, theme: camp.theme, keywords: camp.keywords || [], rate: co.id === "sccl" ? D.brand.rate : null, regulator: co.regulator || "", channel: "Google " + (camp.type || "Search") + " RSA", taxonomy: getProductTaxonomy(co, camp) };
  const addToList = (list, t, max) => { const e = list.findIndex(x => !x.text.trim()); if (e >= 0) list[e].text = t; else if (list.length < max) list.push({ text: t, pin: null }); };
  const aiAddHeadline = (t) => editAd(activeAd, a => addToList(a.headlines, t, 15));
  const aiAddDescription = (t) => editAd(activeAd, a => addToList(a.descriptions, t, 4));

  const addVariation = () => store.editCampaign(camp.id, c => {
    c.variations = c.variations || [];
    c.variations.push({ path1: c.path1, path2: c.path2,
      headlines: Array.from({ length: 3 }, () => ({ text: "", pin: null })),
      descriptions: Array.from({ length: 2 }, () => ({ text: "", pin: null })) });
  });
  const removeVariation = (idx) => store.editCampaign(camp.id, c => { c.variations.splice(idx, 1); });
  const save = () => {
    const over = [camp, ...(camp.variations || [])].reduce((n, a) => n + a.headlines.filter(h => h.text.length > 30).length + a.descriptions.filter(d => d.text.length > 90).length, 0);
    over ? toast(`Saved — ${over} field${over > 1 ? "s" : ""} over the character limit`, "warn") : toast("Copy saved", "ok");
  };
  const copyToBing = () => { store.copyToBing(camp.id); toast("Ad copy duplicated to Microsoft Bing", "ok"); };

  return (
    <div className="screen-in">
      {showNew && <NewCampaignModal company={store.activeCompany} onClose={() => setShowNew(false)}
        onCreate={(c) => { store.addCampaign(c); setCampId(c.id); setShowNew(false); setOpenAds({ main: true }); setActiveAd("main"); toast("Campaign created", "ok"); }} />}
      <div className="gs-grid" style={{ display: "grid", gridTemplateColumns: "minmax(0,1.15fr) minmax(370px,.85fr)", alignItems: "start" }}>
        {/* LEFT */}
        <div style={{ padding: "22px 24px", borderRight: "1px solid var(--line)", minHeight: "calc(100vh - 64px)" }}>
          <div className="card" style={{ padding: 16, marginBottom: 18 }}>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-end", marginBottom: 12 }}>
              <div style={{ flex: 1 }}>
                <label className="field-label">Campaign <span style={{ textTransform: "none", fontWeight: 500, color: co.accent }}>· {co.short}</span></label>
                <select className="select" value={camp.id} onChange={e => { setCampId(e.target.value); setOpenAds({ main: true }); setActiveAd("main"); }}>
                  {list.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <button className="btn btn-primary" onClick={() => setShowNew(true)}><Icon name="plus" size={15} /> New Campaign</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <div><label className="field-label">Campaign type</label>
                <select className="select" value={camp.type || "Search"} onChange={e => editField(c => { c.type = e.target.value; })}>
                  {D.campaignTypes.map(t => <option key={t.id} value={t.id}>{t.id}</option>)}
                </select></div>
              <div><label className="field-label">Ad Group</label><input className="input" value={camp.adGroup} onChange={e => editField(c => { c.adGroup = e.target.value; })} /></div>
              <div><label className="field-label">Account</label><input className="input" value={camp.account} onChange={e => editField(c => { c.account = e.target.value; })} /></div>
              <div><label className="field-label">Theme / Intent</label><input className="input" value={camp.theme} onChange={e => editField(c => { c.theme = e.target.value; })} /></div>
              <div><label className="field-label">Status</label><div style={{ paddingTop: 3 }}><StatusBadge status={camp.status} onChange={s => editField(c => { c.status = s; })} /></div></div>
              <div style={{ gridColumn: "1 / -1" }}><label className="field-label">Final URL</label><input className="input" value={camp.finalUrl} onChange={e => editField(c => { c.finalUrl = e.target.value; })} /></div>
            </div>
            <CampaignDates camp={camp} edit={editField} />
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--line)" }}>
              <KeywordsEditor keywords={camp.keywords || []} match={camp.keywordMatch || "Phrase"}
                onChange={kw => editField(c => { c.keywords = kw; })} onMatch={m => editField(c => { c.keywordMatch = m; })} compact />
            </div>
          </div>

          {/* AI generator — Task 2 */}
          <AIGenerator key={camp.id} ctx={ctx} onAddHeadline={aiAddHeadline} onAddDescription={aiAddDescription} />

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "var(--navy)", textTransform: "uppercase", letterSpacing: ".02em" }}>{camp.type === "Search" || !camp.type ? "Responsive Search Ads" : camp.type + " Ads"} <span style={{ color: "var(--ink-faint)", fontWeight: 500 }}>· {adCount} ad{adCount > 1 ? "s" : ""}</span></div>
          </div>

          <GoogleAd adKey="main" label="Ad 1 · Primary" ad={camp} domain={camp.domain} limits={D.limits}
            open={!!openAds.main} onToggle={() => setOpenAds(o => ({ ...o, main: !o.main }))}
            active={activeAd === "main"} onActivate={() => setActiveAd("main")} edit={fn => editAd("main", fn)} />

          {(camp.variations || []).map((v, i) => (
            <GoogleAd key={i} adKey={i} label={`Ad ${i + 2} · Variation`} ad={v} domain={camp.domain} limits={D.limits}
              open={!!openAds[i]} onToggle={() => setOpenAds(o => ({ ...o, [i]: !o[i] }))}
              active={activeAd === i} onActivate={() => setActiveAd(i)}
              onRemove={() => { removeVariation(i); if (activeAd === i) setActiveAd("main"); }} edit={fn => editAd(i, fn)} />
          ))}

          <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
            <button className="btn" style={{ flex: 1, justifyContent: "center" }} onClick={() => { addVariation(); const ni = (camp.variations || []).length; setOpenAds(o => ({ ...o, [ni]: true })); setActiveAd(ni); }}><Icon name="plus" size={15} /> Add Ad Variation</button>
            <button className="btn btn-ghost" onClick={copyToBing}><Icon name="copy" size={15} /> Copy to Bing</button>
          </div>
        </div>

        {/* RIGHT */}
        <div style={{ padding: "22px 24px", position: "sticky", top: 64, alignSelf: "start" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "var(--navy)", textTransform: "uppercase", letterSpacing: ".02em" }}>Live Preview <span style={{ color: "var(--ink-faint)", fontWeight: 500 }}>· {activeAd === "main" ? "Ad 1" : "Ad " + (activeAd + 2)}</span></div>
            <button className="btn btn-primary btn-sm" onClick={save}><Icon name="check" size={14} /> Save Copy</button>
          </div>

          {/* format toggle (carousel-style) */}
          <div style={{ display: "inline-flex", gap: 2, background: "#eef0f3", borderRadius: 8, padding: 3, marginBottom: 14 }}>
            {["desktop", "mobile"].map(v => (
              <button key={v} onClick={() => setPview(v)} style={{ border: "none", borderRadius: 6, padding: "5px 13px", fontSize: 12.5, fontWeight: 600, cursor: "pointer",
                background: pview === v ? "#fff" : "transparent", color: pview === v ? "var(--navy)" : "var(--ink-soft)", boxShadow: pview === v ? "var(--shadow-sm)" : "none", textTransform: "capitalize" }}>{v}</button>
            ))}
          </div>

          <PreviewControls ad={previewAd} sel={sel} setSel={setSel} />

          {pview === "desktop" ? (
            <div className="card" style={{ padding: 16, marginBottom: 18 }}><GooglePreview ad={previewAd} domain={camp.domain} sel={sel} /></div>
          ) : (
            <div style={{ marginBottom: 18 }}><PhoneFrame><GooglePreview ad={previewAd} domain={camp.domain} mobile sel={sel} /></PhoneFrame></div>
          )}

          <div className="card" style={{ padding: 14, background: "var(--navy)", border: "none", color: "#dfe5ee" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 10 }}>
              <Icon name="pin" size={14} style={{ color: "var(--gold)" }} fill />
              <span style={{ fontWeight: 700, fontSize: 12.5, color: "#fff", textTransform: "uppercase", letterSpacing: ".03em" }}>Pinning Guide</span>
            </div>
            {D.pinningGuide.map((p, i) => (
              <div key={i} style={{ display: "flex", gap: 9, padding: "5px 0", borderTop: i ? "1px solid rgba(255,255,255,.08)" : "none", alignItems: "baseline" }}>
                <span style={{ color: p.pinned ? "var(--gold)" : "#8a96a8", fontWeight: 700, fontSize: 12, minWidth: 74, flexShrink: 0 }}>{p.slot}</span>
                <span style={{ fontSize: 12, lineHeight: 1.4 }}>{p.rule}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <style>{`.rowdel{opacity:0;transition:opacity .12s;} div:hover>.rowdel{opacity:1;}
        @media (max-width: 1080px) { .gs-grid { grid-template-columns: 1fr !important; }
          .gs-grid > div:first-child { border-right: none !important; border-bottom: 1px solid var(--line); min-height: 0 !important; }
          .gs-grid > div:last-child { position: static !important; } }`}</style>
    </div>
  );
}

Object.assign(window, { GoogleSearchScreen, GooglePreview, PhoneFrame, CopyRow, orderForPreview, togglePin, GoogleAd, NewCampaignModal, CampaignDates });

</script>

<script type="text/babel">
/* Google Ads sub-screens: Campaigns (with campaign-type dropdown) + Ad groups.
   These back the new sidebar sub-navigation. Reuse NewCampaignModal from screen_google.jsx. */

function typePill(typeId) {
  const D = window.LAMF_DATA;
  const t = D.campaignTypeById(typeId);
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11.5, fontWeight: 600, color: "var(--navy)", background: "#eef2fb", border: "1px solid #dbe6fb", borderRadius: 20, padding: "2px 9px 2px 7px", whiteSpace: "nowrap" }}>
      <span style={{ width: 16, height: 16, borderRadius: 5, background: "#1A73E8", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name={t.icon} size={10} /></span>
      {t.id}
    </span>
  );
}

/* ================= CAMPAIGNS ================= */
function CampaignsScreen({ store, onNav }) {
  const D = window.LAMF_DATA;
  const toast = useToast();
  const [, setCampId] = store.useCampaign();
  const [showNew, setShowNew] = useState(false);
  const [fType, setFType] = useState("All");
  const [fStatus, setFStatus] = useState("All");
  const all = store.companyCampaigns(store.activeCompany);
  const list = all.filter(c => (fType === "All" || (c.type || "Search") === fType) && (fStatus === "All" || c.status === fStatus));
  const open = (c) => { setCampId(c.id); onNav("google", c.id); };
  const typeCounts = {}; all.forEach(c => { const t = c.type || "Search"; typeCounts[t] = (typeCounts[t] || 0) + 1; });

  return (
    <Page max={1500}>
      {showNew && <NewCampaignModal company={store.activeCompany} onClose={() => setShowNew(false)}
        onCreate={(c) => { store.addCampaign(c); setShowNew(false); toast("Campaign created", "ok"); setCampId(c.id); onNav("google", c.id); }} />}
      <PageHead title="Campaigns" sub="Every Google Ads campaign for this company — grouped by campaign type"
        actions={<button className="btn btn-primary" onClick={() => setShowNew(true)}><Icon name="plus" size={15} /> New Campaign</button>} />

      <div className="card" style={{ padding: "12px 16px", marginBottom: 16, display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span className="field-label" style={{ margin: 0 }}>Campaign type</span>
          <select className="select" style={{ width: "auto", fontSize: 12.5 }} value={fType} onChange={e => setFType(e.target.value)}>
            <option value="All">All types ({all.length})</option>
            {D.campaignTypes.map(t => <option key={t.id} value={t.id}>{t.id}{typeCounts[t.id] ? ` (${typeCounts[t.id]})` : ""}</option>)}
          </select>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span className="field-label" style={{ margin: 0 }}>Status</span>
          <select className="select" style={{ width: "auto", fontSize: 12.5 }} value={fStatus} onChange={e => setFStatus(e.target.value)}>
            <option>All</option>{D.statuses.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <span style={{ marginLeft: "auto", fontSize: 12, color: "var(--ink-faint)" }}>{list.length} campaign{list.length !== 1 ? "s" : ""}</span>
      </div>

      <div className="card" style={{ overflow: "auto" }}>
        <table className="ga-tbl">
          <thead><tr>
            <th style={{ minWidth: 220 }}>Campaign</th><th style={{ minWidth: 150 }}>Type</th><th>Status</th>
            <th>Ad groups</th><th>Keywords</th><th>Ads</th><th>Created</th><th>Go-live</th><th></th>
          </tr></thead>
          <tbody>
            {list.map(c => {
              const co = D.companyById(c.company);
              const ads = 1 + (c.variations ? c.variations.length : 0);
              return (
                <tr key={c.id} onClick={() => open(c)} style={{ cursor: "pointer" }}>
                  <td>
                    <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
                      <span style={{ width: 8, height: 8, borderRadius: "50%", background: co.accent, flexShrink: 0 }}></span>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontWeight: 600, fontSize: 13.5, color: "var(--navy)" }}>{c.name}</div>
                        <div style={{ fontSize: 11.5, color: "var(--ink-faint)" }}>{co.short} · {c.theme}</div>
                      </div>
                    </div>
                  </td>
                  <td onClick={e => e.stopPropagation()}>
                    <select className="select" style={{ fontSize: 12, padding: "5px 24px 5px 9px", width: "auto", minWidth: 140 }} value={c.type || "Search"}
                      onChange={e => store.editCampaign(c.id, x => { x.type = e.target.value; })}>
                      {D.campaignTypes.map(t => <option key={t.id} value={t.id}>{t.id}</option>)}
                    </select>
                  </td>
                  <td onClick={e => e.stopPropagation()}><StatusBadge status={c.status} onChange={s => store.editCampaign(c.id, x => { x.status = s; })} size="sm" /></td>
                  <td style={{ fontSize: 12.5, color: "var(--ink-soft)" }}>{c.adGroup}</td>
                  <td style={{ fontFamily: "var(--mono)", fontSize: 12.5, color: "var(--ink-soft)" }}>{(c.keywords || []).length}</td>
                  <td style={{ fontFamily: "var(--mono)", fontSize: 12.5, color: "var(--ink-soft)" }}>{ads}</td>
                  <td style={{ fontSize: 12.5, color: "var(--ink-soft)", whiteSpace: "nowrap" }}>{LAMF_DATEFMT(c.created)}</td>
                  <td style={{ fontSize: 12.5, color: "var(--ink-soft)", whiteSpace: "nowrap" }}>{LAMF_DATEFMT(c.golive)}</td>
                  <td><button className="btn btn-sm btn-ghost" onClick={e => { e.stopPropagation(); open(c); }}>Open <Icon name="arrowRight" size={13} /></button></td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {list.length === 0 && <div style={{ padding: 30, textAlign: "center" }} className="empty-tip">No campaigns match these filters.</div>}
      </div>
      <style>{`.ga-tbl{width:100%;border-collapse:collapse;font-size:13px;}
        .ga-tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--line-strong);white-space:nowrap;}
        .ga-tbl td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
        .ga-tbl tr:last-child td{border-bottom:none;} .ga-tbl tbody tr:hover{background:#fafbfc;}`}</style>
    </Page>
  );
}

/* ================= AD GROUPS ================= */
function AdGroupsScreen({ store, onNav }) {
  const D = window.LAMF_DATA;
  const toast = useToast();
  const [, setCampId] = store.useCampaign();
  const [fCamp, setFCamp] = useState("All");
  const all = store.companyCampaigns(store.activeCompany);
  const list = all.filter(c => fCamp === "All" || c.id === fCamp);
  const open = (c) => { setCampId(c.id); onNav("google", c.id); };

  return (
    <Page max={1400}>
      <PageHead title="Ad groups" sub="Each ad group holds its keywords and the responsive ads that target them" />
      <div className="card" style={{ padding: "12px 16px", marginBottom: 16, display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>

        <span style={{ marginLeft: "auto", fontSize: 12, color: "var(--ink-faint)" }}>{list.length} ad group{list.length !== 1 ? "s" : ""}</span>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(360px,1fr))", gap: 14 }}>
        {list.map(c => {
          const co = D.companyById(c.company);
          const ads = 1 + (c.variations ? c.variations.length : 0);
          const filledH = c.headlines.filter(h => h.text.trim()).length;
          return (
            <div key={c.id} className="card" style={{ padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>

                {typePill(c.type)}

              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>

                <span style={{ color: "var(--line-strong)" }}>·</span>

              <button className="btn" style={{ justifyContent: "center" }} onClick={() => open(c)}><Icon name="edit" size={14} /> Open ads &amp; write copy</button>
            </div>
          );
        })}
      </div>
      {list.length === 0 && <div className="card" style={{ padding: 30, textAlign: "center", marginTop: 6 }}><span className="empty-tip">No ad groups for this company.</span></div>}
    </Page>
  );
}

Object.assign(window, { CampaignsScreen, AdGroupsScreen, typePill });

</script>

<script type="text/babel">
/* SCREEN 1 — Dashboard. Group overview (all companies) + per-company campaign view. */
function StatCard({ label, value, sub, icon, accent }) {
  const isGold = accent === "gold";
  return (
    <div style={{ background: "#fff", border: "1px solid #e0e3e8", borderRadius: 10, padding: "18px 20px", display: "flex", flexDirection: "column", gap: 6 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>

        <div style={{ width: 32, height: 32, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center",
          background: isGold ? "var(--gold-tint)" : "#eef2fb", color: isGold ? "var(--gold)" : "var(--blue)" }}><Icon name={icon} size={16} /></div>
      </div>
      <div style={{ fontSize: 34, fontWeight: 800, letterSpacing: "-.03em", color: "var(--navy)", lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 11.5, color: "var(--ink-faint)", lineHeight: 1.4 }}>{sub}</div>
    </div>
  );
}

function pctComplete(camps) {
  if (!camps.length) return 0;
  const done = camps.filter(c => c.status === "Approved" || c.status === "Live").length;
  return Math.round((done / camps.length) * 100);
}

/* group view — one card per company */
function CompanyCard({ co, camps, onOpen }) {
  const D = window.LAMF_DATA;
  const st = D.companyStats[co.id] || { organic: 0, automation: 0 };

  const pct = paidCount > 0 ? Math.round((approved / paidCount) * 100) : 0;
  const total = paidCount + st.organic + st.automation;
  const channels = (co.channels || []).slice(0, 3);
  return (
    <div style={{ background: "#fff", border: "1px solid #e0e3e8", borderRadius: 10, borderLeft: `4px solid ${co.accent}`, overflow: "hidden", cursor: "pointer", transition: "box-shadow .15s, transform .12s", display: "flex", flexDirection: "column" }}
      onClick={onOpen}
      onMouseEnter={e => { e.currentTarget.style.boxShadow = "0 4px 16px rgba(26,43,74,.12)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
      onMouseLeave={e => { e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.transform = "none"; }}>
      <div style={{ padding: "14px 16px 10px" }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8, marginBottom: 3 }}>

}

function CampaignCard({ camp, onNav, onStatus }) {

      <div style={{ display: "flex", borderTop: "1px solid var(--line)" }}>
        <button className="cardact" onClick={() => onNav("google", camp.id)}><Icon name="edit" size={14} /> Edit Copy</button>

        .cardact:last-child{border-right:none;} .cardact:hover{background:#f5f6f8;color:var(--navy);}`}</style>

  );
}

                <div key={i} style={{ display: "flex", gap: 10, padding: "8px 0", borderTop: i ? "1px solid var(--line)" : "none" }}>

      <style>{`
        @media (max-width: 1080px){ .dash-grid{grid-template-columns:1fr !important;} .dash-rail{position:static !important;} .stat-grid{grid-template-columns:repeat(2,1fr) !important;} }

          .dash-screen{padding:16px 14px !important;}

          .co-grid{grid-template-columns:1fr !important;}

}

<script type="text/babel">
/* Extensions (scoped + editable), Bing (collapsible ads), Meta (campaign-based, collapsible creatives). */

function Page({ children, max = 1380, pad = "24px 28px" }) {
  return <div className="screen-in" style={{ padding: pad, maxWidth: max, margin: "0 auto" }}>{children}</div>;
}
function PageHead({ title, sub, actions }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 20, gap: 16, flexWrap: "wrap" }}>
      <div>
        <div style={{ fontSize: 19, fontWeight: 700, color: "var(--navy)", letterSpacing: "-.015em" }}>{title}</div>
        {sub && <div style={{ fontSize: 13, color: "var(--ink-faint)", marginTop: 2 }}>{sub}</div>}
      </div>
      {actions && <div style={{ display: "flex", gap: 9 }}>{actions}</div>}
    </div>
  );
}
function ECell({ value, onChange, placeholder, style }) {
  return <input className="ecell" value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)} style={style} />;
}
function ScopeChip({ company, level, campaign }) {
  const D = window.LAMF_DATA;
  const co = D.companyById(company);
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 6, whiteSpace: "nowrap" }}>
      <span style={{ fontSize: 10.5, fontWeight: 700, color: co.accent, background: co.accent + "18", borderRadius: 5, padding: "2px 7px" }}>{co.short}</span>
      <span style={{ fontSize: 11.5, color: "var(--ink-soft)" }}>{level === "campaign" ? (campaign || "—") : "Account-level"}</span>
    </span>
  );
}

/* ================= EXTENSIONS (scoped + editable) ================= */
function ExtensionsScreen({ store }) {
  const D = window.LAMF_DATA;
  const toast = useToast();
  const TABS = ["Sitelinks", "Callouts", "Structured Snippets", "Image", "Promotion"];
  const [tab, setTab] = useState("Sitelinks");

  const companyOptions = D.companies.filter(c => !c.group);
  const [scCompany, setScCompany] = useState(store.activeCompany === "all" ? "sccl" : store.activeCompany);
  const [scLevel, setScLevel] = useState("account");
  const campsForCo = store.campaigns.filter(c => c.company === scCompany);
  const [scCampaign, setScCampaign] = useState(campsForCo[0] ? campsForCo[0].name : "");
  useEffect(() => { const cs = store.campaigns.filter(c => c.company === scCompany); setScCampaign(cs[0] ? cs[0].name : ""); }, [scCompany]);
  const curScope = () => ({ company: scCompany, level: scLevel, campaign: scLevel === "campaign" ? scCampaign : null });

  const mkScope = (i) => i < 4 ? { company: "sccl", level: "account", campaign: null } : { company: "sccl", level: "campaign", campaign: D.campaigns[i % 6] ? D.campaigns[i % 6].name : "Personal Loan Intercept" };
  const [sitelinks, setSitelinks] = useState(() => D.sitelinks.map((s, i) => ({
    scope: mkScope(i), url: `https://www.shriramcredit.com/${(s[0] || "").toLowerCase().replace(/[^a-z]+/g, "-").replace(/^-|-$/g, "")}`,
    title: s[0], d1: s[1], d2: s[2], status: i < 4 ? "Approved" : "Review" })));
  const [callouts, setCallouts] = useState(() => D.callouts.map((c, i) => ({ scope: { company: "sccl", level: "account", campaign: null }, text: c, status: "Approved" })));
  const [snippets, setSnippets] = useState(() => D.snippets.map(s => ({ scope: { company: "sccl", level: "account", campaign: null }, header: s.header, values: s.values.slice() })));
  const [promos, setPromos] = useState(() => D.promotions.map((p, i) => ({ scope: { company: "sccl", level: "account", campaign: null }, occ: p[0], text: p[1], start: p[2], end: p[3], status: i === 0 ? "Live" : "Not Started" })));

  const inCo = (row) => store.activeCompany === "all" || row.scope.company === store.activeCompany;

  const addRow = () => {
    const sc = curScope();
    if (tab === "Sitelinks") setSitelinks(s => [...s, { scope: sc, url: `https://www.${D.companyById(sc.company).domain}/`, title: "", d1: "", d2: "", status: "Not Started" }]);
    else if (tab === "Callouts") setCallouts(c => [...c, { scope: sc, text: "", status: "Not Started" }]);
    else if (tab === "Structured Snippets") setSnippets(s => [...s, { scope: sc, header: "New Header", values: [""] }]);
    else if (tab === "Promotion") setPromos(p => [...p, { scope: sc, occ: "None / Ongoing", text: "", start: "", end: "", status: "Not Started" }]);
    else { toast("Add image assets from the Image tab", "ok"); return; }
    toast(`${tab.replace(/s$/, "")} added to ${D.companyById(sc.company).short} · ${sc.level === "campaign" ? sc.campaign : "Account-level"}`, "ok");
  };
  const updArr = (setter) => (orig, key, val) => setter(arr => arr.map(r => r === orig ? { ...r, [key]: val } : r));
  const us = updArr(setSitelinks), uc = updArr(setCallouts), up = updArr(setPromos);
  const setRowScope = (setter) => (orig, patch) => setter(arr => arr.map(r => r === orig ? { ...r, scope: { ...r.scope, ...patch } } : r));
  const ss = setRowScope(setSitelinks), sc2 = setRowScope(setCallouts), sp = setRowScope(setPromos), sn = setRowScope(setSnippets);

  const ScopeCell = ({ row, onScope }) => {
    const cs = store.campaigns.filter(c => c.company === row.scope.company);
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 4, minWidth: 170 }}>
        <select className="select" style={{ fontSize: 11.5, padding: "4px 20px 4px 7px" }} value={row.scope.company}
          onChange={e => onScope(row, { company: e.target.value, campaign: store.campaigns.find(c => c.company === e.target.value)?.name || null })}>
          {companyOptions.map(c => <option key={c.id} value={c.id}>{c.short}</option>)}
        </select>

function BingPreview({ ad, domain, mobile, sel }) {
  const host = domain || "shriramcredit.com";
  const path = [ad.path1, ad.path2].filter(Boolean).join("/");
  const hls = pickedItems(ad, sel, 3, orderForPreview).slice(0, mobile ? 2 : 3);
  const descs = pickedItems(ad, sel, 4, orderForPreview).slice(0, mobile ? 1 : 2);
  return (
    <div style={{ fontFamily: "'Segoe UI', arial, sans-serif", color: "#202124" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, fontSize: 12, color: "#5f6368" }}>
        <span style={{ fontWeight: 700, color: "#0078D4" }}>Ad</span><span>·</span>
        <span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{host}{path ? "/" + path : ""}</span>
      </div>
      <div style={{ fontSize: mobile ? 17 : 19, color: "#0078D4", lineHeight: 1.3 }}>
        {hls.length ? hls.map((h, i) => <span key={i}>{h.text}{i < hls.length - 1 ? <span style={{ color: "#5f6368" }}> | </span> : ""}</span>) : <span style={{ color: "#9aa0a6" }}>Headlines appear here…</span>}
      </div>
      <div style={{ fontSize: mobile ? 13 : 14, color: "#4d5156", marginTop: 5 }}>{descs.map(d => d.text).join(" ") || "Descriptions appear here…"}</div>
      {mobile && <button style={{ marginTop: 10, width: "100%", border: "1px solid #0078D4", color: "#0078D4", background: "#fff", borderRadius: 18, padding: "8px 0", fontWeight: 600, fontSize: 13 }}>Apply Now</button>}
    </div>
  );
}
function BingScreen({ store }) {
  const D = window.LAMF_DATA;
  const toast = useToast();
  window.__pinWarn = (max) => toast(`All ${max} pins for this set are in use — unpin one first`, "warn");
  const [campId, setCampId] = store.useCampaign();
  const list = store.companyCampaigns(store.activeCompany);
  useEffect(() => { if (!list.find(c => c.id === campId) && list.length) setCampId(list[0].id); }, [store.activeCompany, list.length]);
  const camp = list.find(c => c.id === campId) || list[0];
  const [openAds, setOpenAds] = useState({ main: true });
  const [activeAd, setActiveAd] = useState("main");
  const [pview, setPview] = useState("desktop");
  const [sel, setSel] = useState({ auto: true });
  useEffect(() => { setSel({ auto: true }); }, [campId, activeAd]);
  if (!camp) return <div style={{ padding: 40 }} className="empty-tip">No campaigns for this company.</div>;

  const editAd = (adKey, fn) => store.editCampaign(camp.id, c => { fn(adKey === "main" ? c : c.bingVar[adKey]); });
  const getAd = (adKey) => adKey === "main" ? camp : (camp.bingVar || [])[adKey];
  const previewAd = getAd(activeAd) || camp;
  const co = D.companyById(camp.company);
  const ctx = { name: co.name, short: co.short, theme: camp.theme, keywords: camp.keywords || [], rate: co.id === "sccl" ? D.brand.rate : null, regulator: co.regulator || "", channel: "Microsoft Bing RSA", taxonomy: getProductTaxonomy(co, camp) };
  const addToList = (list, t, max) => { const e = list.findIndex(x => !x.text.trim()); if (e >= 0) list[e].text = t; else if (list.length < max) list.push({ text: t, pin: null }); };
  const aiAddHeadline = (t) => editAd(activeAd, a => addToList(a.headlines, t, 15));
  const aiAddDescription = (t) => editAd(activeAd, a => addToList(a.descriptions, t, 4));
  const addVar = () => store.editCampaign(camp.id, c => { c.bingVar = c.bingVar || []; c.bingVar.push({ path1: c.path1, path2: c.path2, headlines: Array.from({ length: 3 }, () => ({ text: "", pin: null })), descriptions: Array.from({ length: 2 }, () => ({ text: "", pin: null })) }); });
  const removeVar = (i) => store.editCampaign(camp.id, c => { c.bingVar.splice(i, 1); });
  const adCount = 1 + (camp.bingVar ? camp.bingVar.length : 0);

  return (
    <div className="screen-in gs-grid" style={{ display: "grid", gridTemplateColumns: "minmax(0,1.1fr) minmax(360px,.9fr)", alignItems: "start" }}>
      <div style={{ padding: "22px 24px", borderRight: "1px solid var(--line)", minHeight: "calc(100vh - 64px)" }}>
        <PageHead title="Microsoft Bing — RSA" sub="Same RSA format as Google · collapsible ads · Headlines ≤30 · Descriptions ≤90" />
        <div className="card" style={{ padding: 14, marginBottom: 16 }}>
          <label className="field-label">Campaign</label>
          <select className="select" value={camp.id} onChange={e => { setCampId(e.target.value); setOpenAds({ main: true }); setActiveAd("main"); }}>{list.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
          <CampaignDates camp={camp} edit={fn => store.editCampaign(camp.id, fn)} />
          <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid var(--line)" }}>
            <KeywordsEditor keywords={camp.keywords || []} match={camp.keywordMatch || "Phrase"}
              onChange={kw => store.editCampaign(camp.id, c => { c.keywords = kw; })} onMatch={m => store.editCampaign(camp.id, c => { c.keywordMatch = m; })} compact />
          </div>
        </div>

        {/* AI generator — Task 6 (same as Google) */}
        <AIGenerator key={camp.id} ctx={ctx} onAddHeadline={aiAddHeadline} onAddDescription={aiAddDescription} />

        <div style={{ fontSize: 13, fontWeight: 700, color: "var(--navy)", textTransform: "uppercase", letterSpacing: ".02em", marginBottom: 12 }}>Bing Ads <span style={{ color: "var(--ink-faint)", fontWeight: 500 }}>· {adCount} ad{adCount > 1 ? "s" : ""}</span></div>
        <GoogleAd adKey="main" label="Ad 1 · Primary" ad={camp} domain={camp.domain} limits={D.limits}
          open={!!openAds.main} onToggle={() => setOpenAds(o => ({ ...o, main: !o.main }))} active={activeAd === "main"} onActivate={() => setActiveAd("main")} edit={fn => editAd("main", fn)} />
        {(camp.bingVar || []).map((v, i) => (
          <GoogleAd key={i} adKey={i} label={`Ad ${i + 2} · Variation`} ad={v} domain={camp.domain} limits={D.limits}
            open={!!openAds[i]} onToggle={() => setOpenAds(o => ({ ...o, [i]: !o[i] }))} active={activeAd === i} onActivate={() => setActiveAd(i)}
            onRemove={() => { removeVar(i); if (activeAd === i) setActiveAd("main"); }} edit={fn => editAd(i, fn)} />
        ))}
        <button className="btn" style={{ width: "100%", justifyContent: "center", marginTop: 4 }} onClick={() => { addVar(); const ni = (camp.bingVar || []).length; setOpenAds(o => ({ ...o, [ni]: true })); setActiveAd(ni); }}><Icon name="plus" size={15} /> Add Ad Variation</button>
      </div>
      <div style={{ padding: "22px 24px", position: "sticky", top: 64 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "var(--ink-faint)", textTransform: "uppercase", letterSpacing: ".05em" }}>Live Preview · {activeAd === "main" ? "Ad 1" : "Ad " + (activeAd + 2)}</div>
          <div style={{ display: "inline-flex", gap: 2, background: "#eef0f3", borderRadius: 8, padding: 3 }}>
            {["desktop", "mobile"].map(v => <button key={v} onClick={() => setPview(v)} style={{ border: "none", borderRadius: 6, padding: "4px 11px", fontSize: 12, fontWeight: 600, cursor: "pointer", background: pview === v ? "#fff" : "transparent", color: pview === v ? "var(--navy)" : "var(--ink-soft)", textTransform: "capitalize" }}>{v}</button>)}
          </div>
        </div>
        <PreviewControls ad={previewAd} sel={sel} setSel={setSel} />
        {pview === "desktop"
          ? <div className="card" style={{ padding: 16, marginBottom: 18, borderTop: "3px solid #0078D4" }}><BingPreview ad={previewAd} domain={camp.domain} sel={sel} /></div>
          : <div style={{ marginBottom: 18 }}><PhoneFrame><BingPreview ad={previewAd} domain={camp.domain} mobile sel={sel} /></PhoneFrame></div>}
        <div style={{ fontSize: 12, color: "var(--ink-soft)", background: "#eef4fb", border: "1px solid #d3e3f7", borderRadius: 8, padding: "10px 12px" }}>
          <b style={{ color: "#0066b8" }}>Reach note:</b> Also appears on Yahoo, MSN, DuckDuckGo &amp; the LinkedIn Audience Network.
        </div>
      </div>
    </div>
  );
}

/* ================= META (campaign-based, collapsible creatives) ================= */
function MetaCreative({ ad, idx, limits, edit, open, onToggle, active, onActivate, onRemove }) {
  const lenP = ad.primaryText.length, lenH = ad.headline.length, lenL = ad.linkDesc.length;
  const over = (lenP > limits.primary ? 1 : 0) + (lenH > limits.headline ? 1 : 0) + (lenL > limits.linkDesc ? 1 : 0);
  return (
    <div className="card" style={{ marginBottom: 12, overflow: "hidden", boxShadow: active ? "0 0 0 2px var(--gold)" : "var(--shadow-sm)" }}>
      <div onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", cursor: "pointer", background: open ? "#fbfbfc" : "#fff", borderBottom: open ? "1px solid var(--line)" : "none" }}>
        <Icon name="chevron" size={16} style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform .15s", color: "var(--ink-soft)", flexShrink: 0 }} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 13.5, color: "var(--navy)", display: "flex", alignItems: "center", gap: 8 }}>Creative {idx + 1}
            {active && <span style={{ fontSize: 10, fontWeight: 700, color: "var(--gold)", background: "var(--gold-tint)", border: "1px solid var(--gold-soft)", borderRadius: 5, padding: "1px 6px" }}>PREVIEWING</span>}
          </div>
          <div style={{ fontSize: 12, color: "var(--ink-faint)", marginTop: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ad.headline || "Untitled headline"}</div>
        </div>
        {over > 0 && <span className="pill pill-red" style={{ flexShrink: 0 }}>{over} over</span>}
        {!active && <button className="btn btn-sm btn-ghost" onClick={e => { e.stopPropagation(); onActivate(); }}><Icon name="eye" size={13} /> Preview</button>}
        {onRemove && <button className="btn btn-sm btn-ghost" onClick={e => { e.stopPropagation(); onRemove(); }}><Icon name="trash" size={14} /></button>}
      </div>
      {open && (
        <div style={{ padding: 14 }} onClick={() => { if (!active) onActivate(); }}>
          <div style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}><span className="field-label" style={{ margin: 0 }}>Primary Text</span><CharPill len={lenP} limit={limits.primary} /></div>
            <textarea className="input" rows={3} value={ad.primaryText} onChange={e => edit(a => { a.primaryText = e.target.value; })} style={{ fontSize: 13, resize: "vertical" }} />
            <div style={{ fontSize: 11, color: "var(--ink-faint)", marginTop: 3 }}>Recommended ≤125 chars — truncated in feed</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}><span className="field-label" style={{ margin: 0 }}>Headline</span><CharPill len={lenH} limit={limits.headline} /></div>
              <input className="input" value={ad.headline} onChange={e => edit(a => { a.headline = e.target.value; })} style={{ fontSize: 13 }} /></div>
            <div><div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}><span className="field-label" style={{ margin: 0 }}>Link Description</span><CharPill len={lenL} limit={limits.linkDesc} /></div>
              <input className="input" value={ad.linkDesc} onChange={e => edit(a => { a.linkDesc = e.target.value; })} style={{ fontSize: 13 }} /></div>
          </div>
        </div>
      )}
    </div>
  );
}

        </div>
      </div>
    </div>
  );
}

            <div style={{ lineHeight: 1.2 }}><div style={{ fontWeight: 600, fontSize: 13.5 }}>{co.name}</div><div style={{ fontSize: 11.5, color: "#65676b" }}>Sponsored · 🌐</div></div>
          </div>
          <div style={{ padding: "0 14px 12px", fontSize: 13.5, lineHeight: 1.45, color: "#1c1e21" }}>{previewAd.primaryText || "Your primary text appears here…"}</div>
          <ImageSlot label="1200 × 628 px" note="upload creative" ratio="1.91/1" />

              <div style={{ fontWeight: 700, fontSize: 14, color: "#1c1e21", lineHeight: 1.25 }}>{previewAd.headline || "Headline"}</div>
              <div style={{ fontSize: 12, color: "#65676b" }}>{previewAd.linkDesc}</div>

          </div>
        </div>
        <div style={{ fontSize: 11, fontWeight: 600, color: "var(--ink-faint)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".05em" }}>Instagram Story</div>

              <div style={{ width: 22, height: 22, borderRadius: "50%", background: "var(--gold)", color: "var(--navy-900)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 11 }}>S</div>
              <span style={{ color: "#fff", fontSize: 10, fontWeight: 600 }}>{co.short.toLowerCase()}</span>

            <div style={{ color: "#fff", fontSize: 15, fontWeight: 700, textAlign: "center", lineHeight: 1.3, textShadow: "0 1px 6px rgba(0,0,0,.4)" }}>{previewAd.headline || "Headline"}</div>
            <button style={{ background: "var(--gold)", color: "var(--navy-900)", border: "none", borderRadius: 8, padding: "8px 0", fontWeight: 700, fontSize: 12 }}>{camp.cta} ▶</button>

}

<script type="text/babel">
/* Compliance (Excel export), Content Tracker, Automation Tracker, Copy Bank, Guidelines, Settings, stubs. */

/* ================= COMPLIANCE REVIEW ================= */
function ComplianceScreen({ store }) {
  const D = window.LAMF_DATA;
  const toast = useToast();
  const all = store.companyCampaigns(store.activeCompany);
  const camps = all.slice(0, 6);
  const today = new Date().toLocaleDateString("en-IN", { day: "numeric", month: "long", year: "numeric" });
  const maxHL = Math.min(15, Math.max(...camps.map(c => c.headlines.length), 1));
  const maxD = Math.min(4, Math.max(...camps.map(c => c.descriptions.length), 1));
  const rows = [];
  for (let i = 0; i < maxHL; i++) rows.push({ key: "HL" + (i + 1), type: "hl", i });
  for (let i = 0; i < maxD; i++) rows.push({ key: "D" + (i + 1), type: "d", i });
  const verdicts = store.compliance;
  const setVerdict = (campId, rowKey, v) => store.setCompliance(campId, rowKey, v);
  const counts = { Approved: 0, Rejected: 0, Pending: 0, Changes: 0 };
  camps.forEach(c => rows.forEach(r => { const v = (verdicts[c.id] || {})[r.key] || "Pending"; counts[v] = (counts[v] || 0) + 1; }));
  const cellOf = (camp, r) => { const item = r.type === "hl" ? camp.headlines[r.i] : camp.descriptions[r.i];
    return item ? { text: item.text, len: item.text.length, pinned: item.pin != null } : { text: "—", len: 0, pinned: false }; };
  const limit = (t) => t === "hl" ? 30 : 90;
  const VOPTS = ["Pending", "Approved", "Rejected", "Changes"];

  const exportExcel = () => {
    const esc = s => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body>`;
    html += `<table border="1"><tr><td colspan="${camps.length + 3}"><b>COMPLIANCE REVIEW — Ad Copy · Shriram Group · ${today}</b></td></tr><tr></tr>`;
    html += `<tr style="background:#1A2B4A;color:#fff;font-weight:bold"><td>Row</td>` + camps.map(c => `<td>${esc(c.name)}</td>`).join("") + `<td>Verdict</td><td>Notes</td></tr>`;
    rows.forEach(r => {
      const pinned = camps.some(c => cellOf(c, r).pinned);
      html += `<tr${pinned ? ' style="background:#faf3df"' : ''}><td><b>${pinned ? "★ " : ""}${r.key}</b></td>`;
      camps.forEach(c => { const cell = cellOf(c, r); html += `<td>${esc(cell.text)}${cell.text !== "—" ? ` (${cell.len}/${limit(r.type)})` : ""}</td>`; });
      const v = (verdicts.all || {})[r.key] || "Pending";
      html += `<td>${v}</td><td></td></tr>`;
    });
    html += `<tr></tr><tr><td><b>Summary</b></td><td>Approved: ${counts.Approved}</td><td>Rejected: ${counts.Rejected}</td><td>Changes: ${counts.Changes}</td><td>Pending: ${counts.Pending}</td></tr>`;
    html += `</table></body></html>`;
    const blob = new Blob([html], { type: "application/vnd.ms-excel" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `Compliance_Review_${today.replace(/\s/g, "_")}.xls`;
    document.body.appendChild(a); a.click(); a.remove();
    toast("Excel exported — ready to email to compliance", "ok");
  };

  return (
    <Page max={1600}>
      <PageHead title="Compliance Review — Ad Copy" sub={`${store.activeCompany === "all" ? "Shriram Group" : D.companyById(store.activeCompany).name} · RBI Regulated NBFC · ${today}`}
        actions={<>
          <button className="btn" onClick={() => toast("Draft emailed to compliance@shriramcredit.com", "ok")}><Icon name="mail" size={15} /> Email to Compliance</button>
          <button className="btn btn-gold" onClick={exportExcel}><Icon name="download" size={15} /> Export to Excel</button>
        </>} />
      <div style={{ background: "var(--gold-tint)", border: "1px solid var(--gold-soft)", borderRadius: 10, padding: "12px 16px", marginBottom: 18, fontSize: 13, color: "#7a6526", display: "flex", gap: 10, alignItems: "center" }}>
        <Icon name="info" size={16} style={{ color: "var(--gold)", flexShrink: 0 }} />
        Review all copy below and mark each row <b>Approved</b>, <b>Rejected</b>, or <b>Changes Required</b>. Pinned (★ gold) rows are mandatory placements. Export to Excel to circulate, or email the team directly. Status syncs to the Dashboard.
      </div>
      {all.length > camps.length && <div style={{ fontSize: 12, color: "var(--ink-faint)", marginBottom: 10 }}>Showing {camps.length} of {all.length} campaigns — switch company to review the rest.</div>}

      <div className="card" style={{ overflow: "auto" }}>
        <table className="comp-tbl">
          <thead><tr>
            <th style={{ position: "sticky", left: 0, zIndex: 2, background: "#f7f8fa", minWidth: 56 }}>Row</th>
            {camps.map(c => <th key={c.id} style={{ minWidth: 210 }}>{c.name}</th>)}
            <th style={{ minWidth: 130 }}>Verdict (all)</th><th style={{ minWidth: 160 }}>Notes</th>
          </tr></thead>
          <tbody>
            {rows.map(r => {
              const anyPinned = camps.some(c => cellOf(c, r).pinned);
              return (
                <tr key={r.key} style={anyPinned ? { background: "var(--gold-tint)" } : {}}>
                  <td style={{ position: "sticky", left: 0, background: anyPinned ? "#faf3df" : "#fff", fontWeight: 700, fontFamily: "var(--mono)", fontSize: 12, color: anyPinned ? "var(--gold)" : "var(--ink-soft)" }}>{anyPinned && "★ "}{r.key}</td>
                  {camps.map(c => { const cell = cellOf(c, r); return (
                    <td key={c.id}>
                      <div style={{ fontSize: 12.5, lineHeight: 1.4, color: cell.text === "—" ? "var(--ink-faint)" : "var(--ink)" }}>{cell.text || "—"}</div>
                      {cell.text !== "—" && <span style={{ marginTop: 3, display: "inline-block" }}><CharPill len={cell.len} limit={limit(r.type)} /></span>}
                    </td>
                  ); })}
                  <td><select className="select" style={{ fontSize: 12, padding: "5px 22px 5px 8px" }} value={(verdicts.all || {})[r.key] || "Pending"}
                    onChange={e => { const v = e.target.value; camps.forEach(c => setVerdict(c.id, r.key, v)); store.setCompliance("all", r.key, v); }}>
                    {VOPTS.map(v => <option key={v}>{v}</option>)}</select></td>
                  <td><input className="input" placeholder="Add note…" style={{ fontSize: 12, padding: "5px 8px" }} /></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div className="card" style={{ marginTop: 18, padding: "14px 18px", display: "flex", gap: 26, alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ fontWeight: 700, color: "var(--navy)" }}>Summary</span>
        {[["Approved", "var(--green)"], ["Rejected", "var(--red)"], ["Changes", "var(--amber)"], ["Pending", "#5b6573"]].map(([k, col]) => (
          <span key={k} style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 14 }}>
            <span style={{ width: 9, height: 9, borderRadius: "50%", background: col }}></span>
            <b style={{ color: col }}>{counts[k] || 0}</b> <span style={{ color: "var(--ink-soft)" }}>{k}</span>
          </span>
        ))}
        <span style={{ marginLeft: "auto", fontSize: 12.5, color: "var(--ink-faint)" }}>{camps.length} campaigns × {rows.length} rows = {camps.length * rows.length} cells</span>
      </div>
      <style>{`.comp-tbl{width:100%;border-collapse:collapse;font-size:13px;}
        .comp-tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line-strong);background:#f7f8fa;}
        .comp-tbl td{padding:9px 12px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:top;}
        .comp-tbl td:last-child{border-right:none;}`}</style>
    </Page>
  );
}

/* ================= CONTENT TRACKER ================= */
function TrackerScreen({ store }) {
  const D = window.LAMF_DATA;
  const trkSeed = ["2026-05-18", "2026-05-20", "2026-05-24", "2026-05-26", "2026-05-21", "2026-05-28", "2026-05-15", "2026-05-29", "2026-05-17", "2026-05-31", "2026-05-19", "2026-06-01", "2026-05-23", "2026-05-27", "2026-05-30", "2026-06-02", "2026-06-03"];
  const [rows, setRows] = useState(() => store.trackerRows().map((r, i) => ({ ...r, created: r.created || trkSeed[i % trkSeed.length] })));
  const [fCh, setFCh] = useState("All"), [fSt, setFSt] = useState("All"), [fAs, setFAs] = useState("All");
  const [fFrom, setFFrom] = useState(""), [fTo, setFTo] = useState("");
  const channels = ["All", ...new Set(D.tracker.map(r => r[1]))];
  const assignees = ["All", ...new Set(D.tracker.map(r => r[5]))];
  const filtered = rows.filter(r => (fCh === "All" || r.channel === fCh) && (fSt === "All" || r.status === fSt) && (fAs === "All" || r.assignee === fAs) && inRange(r.created, fFrom, fTo));
  const done = filtered.filter(r => r.status === "Approved" || r.status === "Live").length;
  const pct = filtered.length ? Math.round((done / filtered.length) * 100) : 0;
  const rangeActive = fFrom || fTo;
  const setStatus = (id, s) => { const next = rows.map(r => r.id === id ? { ...r, status: s } : r); setRows(next); store.saveTracker(next); };

  return (
    <Page max={1500}>
      <PageHead title="Content Tracker" sub="Ad-copy production status across every channel & campaign"
        actions={<button className="btn btn-primary"><Icon name="plus" size={15} /> Add Task</button>} />
      <div className="card" style={{ padding: "14px 18px", marginBottom: 18, display: "flex", gap: 22, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 200px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ fontSize: 13, fontWeight: 600, color: "var(--navy)" }}>{done} of {filtered.length} complete{rangeActive ? " in range" : ""}</span>
            <span style={{ fontFamily: "var(--mono)", fontWeight: 600, color: "var(--gold)" }}>{pct}%</span>
          </div>
          <div style={{ height: 8, background: "#eef0f3", borderRadius: 5, overflow: "hidden" }}><div style={{ width: pct + "%", height: "100%", background: "linear-gradient(90deg,var(--gold),#b8973f)", borderRadius: 5, transition: "width .4s" }}></div></div>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span className="field-label" style={{ margin: 0 }}>From</span>
            <input type="date" className="select" style={{ width: "auto", fontSize: 12.5 }} value={fFrom} onChange={e => setFFrom(e.target.value)} /></span>
          <span style={{ display: "flex", alignItems: "center", gap: 6 }}><span className="field-label" style={{ margin: 0 }}>To</span>
            <input type="date" className="select" style={{ width: "auto", fontSize: 12.5 }} value={fTo} onChange={e => setFTo(e.target.value)} /></span>
          {rangeActive && <button className="btn btn-sm btn-ghost" onClick={() => { setFFrom(""); setFTo(""); }}>Clear</button>}
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <Icon name="filter" size={15} style={{ color: "var(--ink-faint)" }} />
          <select className="select" style={{ width: "auto", fontSize: 12.5 }} value={fCh} onChange={e => setFCh(e.target.value)}>{channels.map(c => <option key={c}>{c}</option>)}</select>
          <select className="select" style={{ width: "auto", fontSize: 12.5 }} value={fSt} onChange={e => setFSt(e.target.value)}><option>All</option>{D.statuses.map(s => <option key={s}>{s}</option>)}</select>
          <select className="select" style={{ width: "auto", fontSize: 12.5 }} value={fAs} onChange={e => setFAs(e.target.value)}>{assignees.map(a => <option key={a}>{a}</option>)}</select>
        </div>
      </div>

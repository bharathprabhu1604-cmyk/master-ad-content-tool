/* ================= SETTINGS ================= */
function AISettingsCard() {
  const toast = useToast();
  const [provider, setProvider] = React.useState(() => localStorage.getItem("lamf_ai_provider") || "openrouter");
  const [key, setKey] = React.useState(() => localStorage.getItem("lamf_ai_key") || "");
  const [model, setModel] = React.useState(() => getAiModel());
  const [testing, setTesting] = React.useState(false);
  const [show, setShow] = React.useState(false);
  const [diag, setDiag] = React.useState(null);

  const switchProvider = (p) => {
    setProvider(p);
    setKey("");
    setDiag(null);
    if (p === "anthropic") setModel("claude-sonnet-4-6");
    else if (p === "gemini") setModel("gemini-2.0-flash");
    else if (p === "groq") setModel("llama-3.3-70b-versatile");
    else setModel("deepseek/deepseek-chat-v3-0324:free");
  };

  const test = async () => {
    const k = key.trim();
    if (!k) { toast("Enter an API key first", "warn"); return; }
    setTesting(true);
    setDiag(null);
    const d = { modelUsed: null, httpStatus: null, responseBody: null, freeModelsCount: null, freeModelsList: null, fallbackUsed: null };
    try {
      let ok = false;
      if (provider === "openrouter" || provider === "groq") {
        const endpoint = provider === "groq"
          ? "https://api.groq.com/openai/v1/chat/completions"
          : "https://openrouter.ai/api/v1/chat/completions";
        const headers = { "Authorization": `Bearer ${k}`, "Content-Type": "application/json", "X-Title": "LAMF Ad Content Tool" };
        if (provider === "openrouter") headers["HTTP-Referer"] = "https://master-ad-content-tool.onrender.com";

        const ping = async (m) => {
          const ctrl = new AbortController();
          setTimeout(() => ctrl.abort(), 20000);
          const r = await fetch(endpoint, {
            method: "POST", signal: ctrl.signal, headers,
            body: JSON.stringify({ model: m, max_tokens: 10, messages: [{ role: "user", content: "Say OK." }] }),
          });
          const body = await r.text();
          return { status: r.status, ok: r.ok, body, model: m };
        };

        const initialModel = provider === "groq" ? "llama-3.1-8b-instant" : model;
        let result = await ping(initialModel);
        d.modelUsed = result.model; d.httpStatus = result.status; d.responseBody = result.body;

        if (!result.ok && provider === "openrouter") {
          // Fetch live free models from OpenRouter
          const mRes = await fetch("https://openrouter.ai/api/v1/models", { headers: { "Authorization": `Bearer ${k}` } });
          const mJson = await mRes.json().catch(() => ({ data: [] }));
          // exclude reasoning/"thinking" models — they burn the token budget on hidden chain-of-thought
          // and return empty content for short structured-output tasks like ours
          const freeIds = (mJson.data || []).filter(m => m.id.endsWith(":free") && !REASONING_MODEL_PATTERN.test(m.id)).map(m => m.id);
          d.freeModelsCount = freeIds.length;
          d.freeModelsList = freeIds.slice(0, 15);
          // Try fallbacks (skip the one that already failed)
          for (const fb of freeIds.filter(m => m !== model).slice(0, 3)) {
            result = await ping(fb);
            d.modelUsed = result.model; d.httpStatus = result.status; d.responseBody = result.body;
            if (result.ok) { d.fallbackUsed = fb; break; }
          }
        }

        if (!result.ok) {
          const errBody = (() => { try { return JSON.parse(result.body); } catch { return {}; } })();
          throw new Error(errBody.error?.message || `HTTP ${result.status}`);
        }
        ok = true;
      } else if (provider === "gemini") {
        const r = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${k}`,
          { method: "POST", headers: { "content-type": "application/json" },
            body: JSON.stringify({ contents: [{ parts: [{ text: "Say OK." }] }], generationConfig: { maxOutputTokens: 10 } }) }
        );
        d.httpStatus = r.status; d.responseBody = await r.text(); d.modelUsed = model;
        if (!r.ok) { const e = JSON.parse(d.responseBody || "{}"); throw new Error(e.error?.message || `HTTP ${r.status}`); }
        ok = true;
      } else {
        const r = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "x-api-key": k, "anthropic-version": "2023-06-01", "content-type": "application/json", "anthropic-dangerous-direct-browser-access": "true" },
          body: JSON.stringify({ model, max_tokens: 10, messages: [{ role: "user", content: "Say OK." }] }),
        });
        d.httpStatus = r.status; d.responseBody = await r.text(); d.modelUsed = model;
        if (!r.ok) { const e = JSON.parse(d.responseBody || "{}"); throw new Error(e.error?.message || `HTTP ${r.status}`); }
        ok = true;
      }
      if (ok) {
        const savedModel = d.fallbackUsed || model;
        if (d.fallbackUsed) setModel(d.fallbackUsed);
        localStorage.setItem("lamf_ai_key", k);
        localStorage.setItem("lamf_ai_model", savedModel);
        localStorage.setItem("lamf_ai_provider", provider);
        toast(d.fallbackUsed ? `Connected via fallback: ${d.fallbackUsed}` : "Connection successful — AI generation is live!", "ok");
      }
    } catch (e) { toast("Connection failed: " + e.message, "err"); }
    setDiag({ ...d });
    setTesting(false);
  };

  const save = () => {
    localStorage.setItem("lamf_ai_key", key.trim());
    localStorage.setItem("lamf_ai_model", model);
    localStorage.setItem("lamf_ai_provider", provider);
    toast("AI settings saved", "ok");
  };

  const saved = localStorage.getItem("lamf_ai_key");
  const isOpenRouter = provider === "openrouter";
  const isGroq = provider === "groq";
  const isGemini = provider === "gemini";

  const PROVIDERS = [
    { id: "openrouter", label: "OpenRouter", badge: "FREE ★", color: "#6c47ff", bg: "#f0edff", badgeColor: "#4a2fcb", badgeBg: "#e0d9ff", sub: "Free models · Works in India · No credit card" },
    { id: "gemini", label: "Google Gemini", badge: "FREE", color: "#1a73e8", bg: "#e8f0fe", badgeColor: "#137333", badgeBg: "#e6f4ea", sub: "1,500 free req/day · Gemini 2.0" },
    { id: "anthropic", label: "Anthropic Claude", badge: "PAID", color: "#7A52B5", bg: "#ede0fa", badgeColor: "#7A52B5", badgeBg: "#ede0fa", sub: "~₹0.01/generation · Deepest quality" },
  ];

  return (
    <div className="card" style={{ padding: 18, border: "1px solid #d8c9f0", background: "linear-gradient(180deg,#faf8ff,#fff 70%)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
        <span style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(150deg,#7A52B5,#9b6fd4)", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name="spark" size={16} /></span>
        <div>
          <div style={{ fontWeight: 700, fontSize: 13, color: "var(--navy)", textTransform: "uppercase", letterSpacing: ".03em" }}>AI Content Generator</div>
          <div style={{ fontSize: 12, color: "var(--ink-faint)" }}>Powers the 2-stage marketing agent on all screens</div>
        </div>
        {saved && <span style={{ marginLeft: "auto", fontSize: 10.5, fontWeight: 700, color: "var(--green)", background: "var(--green-bg)", borderRadius: 5, padding: "2px 8px", flexShrink: 0 }}>ACTIVE</span>}
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {PROVIDERS.map(p => (
          <button key={p.id} onClick={() => switchProvider(p.id)}
            style={{ flex: 1, padding: "10px 12px", borderRadius: 10, border: `2px solid ${provider === p.id ? p.color : "var(--line)"}`, background: provider === p.id ? p.bg : "#fff", cursor: "pointer", textAlign: "left", transition: "all .15s" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
              <span style={{ fontWeight: 700, fontSize: 12.5, color: provider === p.id ? p.color : "var(--ink)" }}>{p.label}</span>
              <span style={{ fontSize: 9, fontWeight: 700, color: p.badgeColor, background: p.badgeBg, borderRadius: 4, padding: "1px 5px" }}>{p.badge}</span>
            </div>
            <div style={{ fontSize: 10.5, color: "var(--ink-faint)", marginTop: 2, lineHeight: 1.3 }}>{p.sub}</div>
          </button>
        ))}
      </div>

      {isOpenRouter && (
        <div style={{ background: "#f0edff", border: "1px solid #c5b8ff", borderRadius: 8, padding: "10px 12px", marginBottom: 14, fontSize: 12, color: "#2d1a7a" }}>
          <b>Get your free OpenRouter key (1 min):</b><br />
          1. Go to <a href="https://openrouter.ai/keys" target="_blank" rel="noreferrer" style={{ color: "#6c47ff", fontWeight: 600 }}>openrouter.ai/keys</a><br />
          2. Sign up with Google (no credit card needed)<br />
          3. Click <b>Create Key</b> → copy it → paste below<br />
          <span style={{ color: "#4a2fcb" }}>Select a model with <b>:free</b> suffix — completely free, no limits.</span>
        </div>
      )}
      {isGemini && (
        <div style={{ background: "#e8f0fe", border: "1px solid #aecbfa", borderRadius: 8, padding: "10px 12px", marginBottom: 14, fontSize: 12, color: "#1a5296" }}>
          <b>Get your free Gemini key:</b><br />

    const ms = Date.now() - authRaw.loginTime;
    const d = Math.floor(ms / 86400000), h = Math.floor((ms % 86400000) / 3600000), m = Math.floor((ms % 3600000) / 60000);
    return d > 0 ? `${d}d ${h}h ${m}m` : h > 0 ? `${h}h ${m}m` : `${m}m`;
  })() : "—";
  const daysLeft = authRaw && authRaw.expiresAt ? Math.max(0, Math.floor((authRaw.expiresAt - Date.now()) / 86400000)) : null;
  const rows = [
    ["Logged in", store.authed ? "YES" : "NO", store.authed ? "var(--green)" : "var(--red)"],

    ["Days remaining", daysLeft !== null ? `${daysLeft} of ${SESSION_DAYS} days` : "—", daysLeft !== null && daysLeft < 3 ? "var(--red)" : "var(--ink)"],
    ["Session expired", authRaw && authRaw.expiresAt && Date.now() > authRaw.expiresAt ? "YES — will require login" : "NO", authRaw && authRaw.expiresAt && Date.now() > authRaw.expiresAt ? "var(--red)" : "var(--green)"],

/* ================= AUTOMATION STUDIO ================= */
function AutomationScreen({ store }) {
  const D = window.LAMF_DATA;
  const toast = useToast();
  const companyOptions = D.companies.filter(c => !c.group);
  const [rows, setRows] = useState(() => D.automation.map(r => ({ ...r })));
  const [platforms, setPlatforms] = useState(() => D.automationPlatforms.slice());
  const [fCompany, setFCompany] = useState(store.activeCompany === "all" ? "all" : store.activeCompany);
  const [fChannel, setFChannel] = useState("All");
  const [fPlatform, setFPlatform] = useState("All");
  const [activeId, setActiveId] = useState(() => (D.automation[0] || {}).id);
  const [addingPlat, setAddingPlat] = useState(false);
  const [newPlat, setNewPlat] = useState("");

  useEffect(() => { setFCompany(store.activeCompany === "all" ? "all" : store.activeCompany); }, [store.activeCompany]);

  const list = rows.filter(r => (fCompany === "all" || r.company === fCompany)
    && (fChannel === "All" || r.channel === fChannel) && (fPlatform === "All" || r.platform === fPlatform));
  useEffect(() => { if (!list.find(r => r.id === activeId) && list.length) setActiveId(list[0].id); }, [fCompany, fChannel, fPlatform, rows.length]);
  const active = list.find(r => r.id === activeId) || list[0];

  const upd = (key, val) => setRows(rs => rs.map(r => r.id === active.id ? { ...r, [key]: val } : r));
  const addFlow = () => {
    const co = fCompany === "all" ? "sccl" : fCompany;
    const ch = fChannel === "All" ? "WhatsApp" : fChannel;
    const id = Date.now();
    const meta = D.automationChannels[ch];
    setRows(rs => [...rs, { id, channel: ch, company: co, flow: "New Flow", platform: fPlatform === "All" ? platforms[0] : fPlatform, content: "", subject: meta.hasSubject ? "" : "", cta: meta.cta ? "Apply Now" : "", audience: "", status: "Not Started", assignee: store.user.name, schedule: "" }]);
    setActiveId(id);
    toast("Flow created — edit content on the left", "ok");
  };
  const addPlatform = () => { const p = newPlat.trim(); if (!p) return; if (!platforms.includes(p)) setPlatforms(ps => [...ps, p]); setNewPlat(""); setAddingPlat(false); toast(`Platform “${p}” added`, "ok"); };

  const live = rows.filter(r => (fCompany === "all" || r.company === fCompany) && r.status === "Live").length;

  if (!active) {
    return (
      <div className="screen-in" style={{ padding: "22px 24px" }}>
        <PageHead title="Automation Studio" sub="SMS · RCS · WhatsApp · Email — compose CRM messages with a live preview"
          actions={<button className="btn btn-primary" onClick={addFlow}><Icon name="plus" size={15} /> New Flow</button>} />
        <div className="card" style={{ padding: 40, textAlign: "center" }}><span className="empty-tip">No flows match these filters. Create one to get started.</span></div>
      </div>
    );
  }
  const co = D.companyById(active.company);
  const meta = D.automationChannels[active.channel];
  const sender = D.automationSender(active.company);

  return (
    <div className="screen-in gs-grid" style={{ display: "grid", gridTemplateColumns: "minmax(0,1.12fr) minmax(330px,.88fr)", alignItems: "start" }}>
      {/* LEFT */}
      <div style={{ padding: "22px 24px", borderRight: "1px solid var(--line)", minHeight: "calc(100vh - 64px)" }}>
        <PageHead title="Automation Studio" sub="Pick a company, channel & platform — compose the message and preview it live"
          actions={<button className="btn btn-primary" onClick={addFlow}><Icon name="plus" size={15} /> New Flow</button>} />

        {/* selectors — Google-style */}
        <div className="card" style={{ padding: 14, marginBottom: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
            <div><label className="field-label">Company</label>
              <select className="select" value={fCompany} onChange={e => setFCompany(e.target.value)}>
                <option value="all">All Companies</option>{companyOptions.map(c => <option key={c.id} value={c.id}>{c.short}</option>)}
              </select></div>
            <div><label className="field-label">Channel</label>
              <select className="select" value={fChannel} onChange={e => setFChannel(e.target.value)}>
                <option>All</option>{D.automationChannelList.map(c => <option key={c}>{c}</option>)}
              </select></div>
            <div><label className="field-label">Platform</label>
              <select className="select" value={fPlatform} onChange={e => setFPlatform(e.target.value)}>
                <option>All</option>{platforms.map(p => <option key={p}>{p}</option>)}
              </select></div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 11, flexWrap: "wrap" }}>
            {addingPlat
              ? <span style={{ display: "inline-flex", gap: 6, alignItems: "center" }}>
                  <input className="input" autoFocus style={{ width: 150, fontSize: 12.5, padding: "6px 8px" }} placeholder="Platform name" value={newPlat} onChange={e => setNewPlat(e.target.value)} onKeyDown={e => e.key === "Enter" && addPlatform()} />
                  <button className="btn btn-sm btn-primary" onClick={addPlatform}>Add</button>
                  <button className="btn btn-sm btn-ghost" onClick={() => { setAddingPlat(false); setNewPlat(""); }}>✕</button>
                </span>

<script type="text/babel">
/* Bulk text tools — Find & Replace + Spell Check across all ad platforms.
   Reads/writes the shared store (Google + Bing campaigns + Meta campaigns).
   Modeled on the Google Ads "Edit / Find and replace text" dialog:
   choose a field (Headlines / Descriptions / Paths / Final URLs / All) and a
   platform scope (current tab / Google / Bing / Meta / all platforms). */

const { useState: tUS, useEffect: tUE, useMemo: tUM, useRef: tUR } = React;

/* screen id -> platform the user is currently working in */
const SCREEN_PLATFORM = { google: "Google", bing: "Bing", meta: "Meta" };
const PLATFORM_COLOR = { Google: "#1A73E8", Bing: "#0078D4", Meta: "#1877F2", Search: "#1A2B4A" };

/* ---------- collect every editable text field from the store ---------- */
function collectAdFields(store) {
  const fields = [];
  const camps = store.companyCampaigns(store.activeCompany);

  const pushHD = (arr, listName, getList, base) => {
    arr.forEach((it, i) => fields.push({
      ...base, fieldType: listName === "headlines" ? "headline" : "description",
      fieldLabel: (listName === "headlines" ? "Headline " : "Description ") + (i + 1),
      value: it.text || "",
      apply: (s, v) => s.editCampaign(base.campaignId, x => { getList(x)[i].text = v; }),
    }));
  };

  camps.forEach(c => {
    const meta = { campaignId: c.id, campaignName: c.name, company: c.company };
    // ----- main ad: shared by Google + Bing -----
    const mainBase = { ...meta, platforms: ["Google", "Bing"], platformLabel: "Search", adLabel: "Ad 1 · Primary" };
    pushHD(c.headlines, "headlines", x => x.headlines, mainBase);
    pushHD(c.descriptions, "descriptions", x => x.descriptions, mainBase);
    ["path1", "path2"].forEach((p, pi) => fields.push({
      ...mainBase, fieldType: "path", fieldLabel: "Path " + (pi + 1), value: c[p] || "",
      apply: (s, v) => s.editCampaign(c.id, x => { x[p] = v; }),
    }));
    fields.push({
      ...mainBase, fieldType: "url", fieldLabel: "Final URL", value: c.finalUrl || "",
      apply: (s, v) => s.editCampaign(c.id, x => { x.finalUrl = v; }),
    });

    // ----- Google ad variations -----
    (c.variations || []).forEach((v, vi) => {
      const b = { ...meta, platforms: ["Google"], platformLabel: "Google", adLabel: `Ad ${vi + 2} · Variation` };
      pushHD(v.headlines, "headlines", x => x.variations[vi].headlines, b);
      pushHD(v.descriptions, "descriptions", x => x.variations[vi].descriptions, b);
      ["path1", "path2"].forEach((p, pi) => fields.push({
        ...b, fieldType: "path", fieldLabel: "Path " + (pi + 1), value: v[p] || "",
        apply: (s, val) => s.editCampaign(c.id, x => { x.variations[vi][p] = val; }),
      }));
    });

    // ----- Bing ad variations -----
    (c.bingVar || []).forEach((v, vi) => {
      const b = { ...meta, platforms: ["Bing"], platformLabel: "Bing", adLabel: `Ad ${vi + 2} · Variation` };
      pushHD(v.headlines, "headlines", x => x.bingVar[vi].headlines, b);
      pushHD(v.descriptions, "descriptions", x => x.bingVar[vi].descriptions, b);
      ["path1", "path2"].forEach((p, pi) => fields.push({
        ...b, fieldType: "path", fieldLabel: "Path " + (pi + 1), value: v[p] || "",
        apply: (s, val) => s.editCampaign(c.id, x => { x.bingVar[vi][p] = val; }),
      }));
    });
  });

  // ----- Meta campaigns -----
  const metas = (store.metaCampaigns || []).filter(m => store.activeCompany === "all" || m.company === store.activeCompany);
  metas.forEach(m => {
    (m.ads || []).forEach((ad, ai) => {
      const b = { campaignId: m.id, campaignName: m.name, company: m.company, platforms: ["Meta"], platformLabel: "Meta", adLabel: `Creative ${ai + 1}` };
      fields.push({ ...b, fieldType: "description", fieldLabel: "Primary text", value: ad.primaryText || "",
        apply: (s, v) => s.editMetaCampaign(m.id, x => { x.ads[ai].primaryText = v; }) });
      fields.push({ ...b, fieldType: "headline", fieldLabel: "Headline", value: ad.headline || "",
        apply: (s, v) => s.editMetaCampaign(m.id, x => { x.ads[ai].headline = v; }) });
      fields.push({ ...b, fieldType: "description", fieldLabel: "Link description", value: ad.linkDesc || "",
        apply: (s, v) => s.editMetaCampaign(m.id, x => { x.ads[ai].linkDesc = v; }) });
    });
  });

  fields.forEach((f, i) => { f.key = f.campaignId + "|" + f.adLabel + "|" + f.fieldLabel + "|" + i; });
  return fields;
}

function scopeFilter(fields, platform) {
  if (platform === "all") return fields;
  return fields.filter(f => f.platforms.includes(platform));
}
function fieldTypeFilter(fields, ftype) {
  if (ftype === "all") return fields;
  return fields.filter(f => f.fieldType === ftype);
}

/* ---------- shared little UI bits ---------- */
function Segmented({ value, onChange, options }) {
  return (
    <div style={{ display: "inline-flex", gap: 2, background: "#eef0f3", borderRadius: 8, padding: 3, flexWrap: "wrap" }}>
      {options.map(o => {
        const on = value === o.id;
        return (
          <button key={o.id} onClick={() => onChange(o.id)}
            style={{ border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 12.5, fontWeight: 600, cursor: "pointer",
              background: on ? "#fff" : "transparent", color: on ? "var(--navy)" : "var(--ink-soft)", boxShadow: on ? "var(--shadow-sm)" : "none", display: "inline-flex", alignItems: "center", gap: 6 }}>
            {o.label}{o.count != null && <span style={{ fontFamily: "var(--mono)", fontSize: 10.5, background: on ? "#eef2fb" : "rgba(0,0,0,.05)", color: on ? "var(--blue)" : "var(--ink-faint)", borderRadius: 9, padding: "0 6px" }}>{o.count}</span>}
          </button>
        );
      })}
    </div>
  );
}
function PlatformTag({ label }) {
  const c = PLATFORM_COLOR[label] || "var(--navy)";
  return <span style={{ fontSize: 10, fontWeight: 700, color: c, background: c + "16", borderRadius: 5, padding: "1px 6px", whiteSpace: "nowrap" }}>{label}</span>;
}
function FieldMeta({ f }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap", minWidth: 0 }}>
      <PlatformTag label={f.platformLabel} />
      <span style={{ fontSize: 12, fontWeight: 600, color: "var(--navy)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 180 }}>{f.campaignName}</span>
      <span style={{ color: "var(--line-strong)" }}>·</span>
      <span style={{ fontSize: 11.5, color: "var(--ink-soft)" }}>{f.adLabel}</span>
      <span style={{ color: "var(--line-strong)" }}>·</span>
      <span style={{ fontSize: 11.5, fontWeight: 600, color: "var(--ink-faint)" }}>{f.fieldLabel}</span>
    </div>
  );
}

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
function buildRegex(find, { matchCase, wholeWord }, global) {
  if (!find) return null;
  let p = escapeRe(find);
  if (wholeWord) p = "\\b" + p + "\\b";
  return new RegExp(p, (global ? "g" : "") + (matchCase ? "" : "i"));
}
/* split text into [{t, hit}] segments for highlighting */
function splitHits(text, re) {
  if (!re) return [{ t: text, hit: false }];
  const r = new RegExp(re.source, re.flags.includes("g") ? re.flags : re.flags + "g");
  const out = []; let last = 0; let m;
  while ((m = r.exec(text)) !== null) {
    if (m.index > last) out.push({ t: text.slice(last, m.index), hit: false });
    out.push({ t: m[0], hit: true });
    last = m.index + m[0].length;
    if (m[0] === "") r.lastIndex++;
  }
  if (last < text.length) out.push({ t: text.slice(last), hit: false });
  return out;
}

/* ============================================================= */
/* ======================  FIND & REPLACE  ===================== */
/* ============================================================= */
function FindReplaceTab({ store, effPlatform, platformOptions }) {
  const toast = useToast();
  const [find, setFind] = tUS("");
  const [repl, setRepl] = tUS("");
  const [matchCase, setMatchCase] = tUS(false);
  const [wholeWord, setWholeWord] = tUS(false);
  const [platform, setPlatform] = tUS(effPlatform);
  const [ftype, setFtype] = tUS("all");
  const [excluded, setExcluded] = tUS(() => new Set());
  tUE(() => { setPlatform(effPlatform); }, [effPlatform]);

  const allFields = collectAdFields(store);
  const scoped = fieldTypeFilter(scopeFilter(allFields, platform), ftype);
  const re = buildRegex(find, { matchCase, wholeWord }, true);

  const matches = tUM(() => {
    if (!re) return [];
    return scoped.map(f => {
      const m = f.value.match(re);
      if (!m) return null;
      return { f, count: m.length, after: f.value.replace(re, repl) };
    }).filter(Boolean);
  }, [find, repl, matchCase, wholeWord, platform, ftype, store]);

  const activeMatches = matches.filter(m => !excluded.has(m.f.key));
  const totalOcc = activeMatches.reduce((n, m) => n + m.count, 0);

  const fieldOptions = [
    { id: "all", label: "All fields" }, { id: "headline", label: "Headlines" },
    { id: "description", label: "Descriptions" }, { id: "path", label: "Paths" }, { id: "url", label: "Final URLs" },
  ];

  const doReplace = () => {
    if (!re) { toast("Type something to find first", "warn"); return; }
    if (activeMatches.length === 0) { toast("No matches selected", "warn"); return; }
    activeMatches.forEach(m => m.f.apply(store, m.f.value.replace(re, repl)));
    toast(`Replaced ${totalOcc} occurrence${totalOcc > 1 ? "s" : ""} in ${activeMatches.length} field${activeMatches.length > 1 ? "s" : ""}`, "ok");
    setExcluded(new Set());
    setFind(""); setRepl("");
  };
  const toggleField = (key) => setExcluded(s => { const n = new Set(s); n.has(key) ? n.delete(key) : n.add(key); return n; });

  return (
    <div>
      {/* inputs */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
        <div>
          <label className="field-label">Find</label>
          <input className="input" autoFocus value={find} onChange={e => { setFind(e.target.value); setExcluded(new Set()); }} placeholder="e.g. 10.5%" />
        </div>
        <div>
          <label className="field-label">Replace with</label>
          <input className="input" value={repl} onChange={e => setRepl(e.target.value)} placeholder="e.g. 10.25%" />
        </div>
      </div>

      {/* options + scope */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: "10px 18px", alignItems: "center", marginBottom: 12 }}>
        <label style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 12.5, color: "var(--ink-soft)", cursor: "pointer" }}>
          <input type="checkbox" checked={matchCase} onChange={e => setMatchCase(e.target.checked)} /> Match case
        </label>
        <label style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 12.5, color: "var(--ink-soft)", cursor: "pointer" }}>
          <input type="checkbox" checked={wholeWord} onChange={e => setWholeWord(e.target.checked)} /> Whole word
        </label>
      </div>

      <div style={{ display: "grid", gap: 9, marginBottom: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <span className="field-label" style={{ margin: 0, minWidth: 56 }}>Field</span>
          <Segmented value={ftype} onChange={setFtype} options={fieldOptions} />
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <span className="field-label" style={{ margin: 0, minWidth: 56 }}>Platform</span>
          <Segmented value={platform} onChange={p => { setPlatform(p); setExcluded(new Set()); }} options={platformOptions} />
        </div>
      </div>

      {/* results */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, gap: 10, flexWrap: "wrap" }}>
        <div style={{ fontSize: 12.5, color: "var(--ink-soft)" }}>
          {!find ? <>Scanning <b style={{ color: "var(--navy)" }}>{scoped.length}</b> fields — type to search.</>
            : matches.length === 0 ? <>No matches for “<b>{find}</b>” in {scoped.length} fields.</>
            : <><b style={{ color: "var(--navy)" }}>{totalOcc}</b> match{totalOcc !== 1 ? "es" : ""} in <b style={{ color: "var(--navy)" }}>{activeMatches.length}</b> field{activeMatches.length !== 1 ? "s" : ""}{excluded.size ? ` · ${excluded.size} skipped` : ""}</>}
        </div>
        {matches.length > 0 && (
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn btn-sm btn-ghost" onClick={() => setExcluded(new Set())}>Select all</button>
            <button className="btn btn-sm btn-ghost" onClick={() => setExcluded(new Set(matches.map(m => m.f.key)))}>Clear</button>
          </div>
        )}
      </div>

      <div style={{ maxHeight: 320, overflowY: "auto", border: matches.length ? "1px solid var(--line)" : "none", borderRadius: 10 }}>
        {matches.map((m, i) => {
          const on = !excluded.has(m.f.key);
          return (
            <div key={m.f.key} style={{ display: "flex", gap: 11, padding: "11px 13px", borderTop: i ? "1px solid var(--line)" : "none", background: on ? "#fff" : "#fafbfc", opacity: on ? 1 : .6 }}>
              <input type="checkbox" checked={on} onChange={() => toggleField(m.f.key)} style={{ marginTop: 3, flexShrink: 0 }} />
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginBottom: 5 }}>
                  <FieldMeta f={m.f} />
                  <span style={{ fontFamily: "var(--mono)", fontSize: 10.5, color: "var(--ink-faint)", flexShrink: 0 }}>{m.count}×</span>
                </div>
                <div style={{ fontSize: 12.5, lineHeight: 1.5, color: "var(--ink-soft)", wordBreak: "break-word" }}>
                  {splitHits(m.f.value, re).map((s, j) => s.hit
                    ? <span key={j} style={{ background: "#fde2e2", color: "#a52727", borderRadius: 3, padding: "0 2px", textDecoration: "line-through" }}>{s.t}</span>
                    : <span key={j}>{s.t}</span>)}
                </div>
                {repl !== find && (
                  <div style={{ fontSize: 12.5, lineHeight: 1.5, color: "var(--ink)", wordBreak: "break-word", marginTop: 3 }}>
                    <Icon name="arrowRight" size={11} style={{ color: "var(--green)", verticalAlign: "middle", marginRight: 4 }} />
                    {splitHits(m.after, buildRegex(repl, { matchCase, wholeWord }, true)).map((s, j) => s.hit
                      ? <span key={j} style={{ background: "#dff2e6", color: "#157a42", borderRadius: 3, padding: "0 2px", fontWeight: 600 }}>{s.t}</span>
                      : <span key={j}>{s.t}</span>)}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ display: "flex", justifyContent: "flex-end", gap: 9, marginTop: 16 }}>
        <button className="btn btn-primary" onClick={doReplace} disabled={activeMatches.length === 0} style={activeMatches.length === 0 ? { opacity: .5 } : {}}>
          <Icon name="check" size={15} /> Replace {totalOcc > 0 ? totalOcc : "all"}
        </button>
      </div>
    </div>
  );
}

/* ============================================================= */
/* =========================  SPELL CHECK  ===================== */
/* ============================================================= */
function SpellCheckTab({ store, effPlatform, platformOptions }) {
  const toast = useToast();
  const SP = window.LAMF_SPELL;
  const [platform, setPlatform] = tUS(effPlatform);
  const [bump, setBump] = tUS(0);          // forces recompute after edits / dict changes
  const [ignored, setIgnored] = tUS(() => new Set());
  tUE(() => { setPlatform(effPlatform); }, [effPlatform]);

  const allFields = collectAdFields(store);
  const scoped = scopeFilter(allFields, platform);

  const results = tUM(() => {
    return scoped.map(f => {
      const toks = SP.checkText(f.value).filter(t => !ignored.has(t.text.toLowerCase()));
      return toks.length ? { f, toks } : null;
    }).filter(Boolean);
  }, [platform, store, bump, ignored]);

  const totalIssues = results.reduce((n, r) => n + r.toks.length, 0);
  const uniqueWords = [...new Set(results.flatMap(r => r.toks.map(t => t.text.toLowerCase())))];

  // replace one occurrence (by offset) in a field, then recompute
  const fixOne = (f, tok, replacement) => {
    const v = f.value;
    const nv = v.slice(0, tok.start) + replacement + v.slice(tok.end);
    f.apply(store, nv);
    setBump(b => b + 1);
  };
  // replace every occurrence of a word across ALL scoped fields
  const fixAll = (word, replacement) => {
    const re = new RegExp("\\b" + escapeRe(word) + "\\b", "g");
    let n = 0;
    scoped.forEach(f => { if (re.test(f.value)) { re.lastIndex = 0; const nv = f.value.replace(re, m => { n++; return matchCaseRepl(m, replacement); }); f.apply(store, nv); } });
    setBump(b => b + 1);
    toast(`Replaced “${word}” → “${replacement}” (${n})`, "ok");
  };
  const matchCaseRepl = (orig, repl) => /^[A-Z]/.test(orig) ? repl[0].toUpperCase() + repl.slice(1) : repl;
  const ignoreWord = (word) => setIgnored(s => new Set(s).add(word.toLowerCase()));
  const addDict = (word) => { SP.addToDictionary(word); setBump(b => b + 1); toast(`Added “${word}” to dictionary`, "ok"); };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 14 }}>
        <span className="field-label" style={{ margin: 0, minWidth: 56 }}>Platform</span>
        <Segmented value={platform} onChange={setPlatform} options={platformOptions} />
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, padding: "10px 13px", borderRadius: 10,
        background: totalIssues ? "#fdeeee" : "#e9f7f0", border: `1px solid ${totalIssues ? "#f3c9c9" : "#bfe6d4"}` }}>
        <span style={{ width: 26, height: 26, borderRadius: "50%", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
          background: totalIssues ? "var(--red)" : "var(--green)", color: "#fff" }}>
          {totalIssues ? <span style={{ fontWeight: 800 }}>!</span> : <Icon name="check" size={15} />}
        </span>
        <div style={{ fontSize: 13, color: totalIssues ? "#9a3b3b" : "#157a42", fontWeight: 600 }}>
          {totalIssues
            ? <>{totalIssues} possible misspelling{totalIssues > 1 ? "s" : ""} across {results.length} field{results.length > 1 ? "s" : ""} · {uniqueWords.length} unique word{uniqueWords.length > 1 ? "s" : ""}</>
            : <>No spelling issues found in {scoped.length} fields {platform === "all" ? "across all platforms" : "for " + platform}.</>}
        </div>
        {ignored.size > 0 && <button className="btn btn-sm btn-ghost" style={{ marginLeft: "auto" }} onClick={() => setIgnored(new Set())}>Reset ignored ({ignored.size})</button>}
      </div>

      <div style={{ maxHeight: 360, overflowY: "auto", border: results.length ? "1px solid var(--line)" : "none", borderRadius: 10 }}>
        {results.map((r, i) => (
          <div key={r.f.key} style={{ padding: "11px 13px", borderTop: i ? "1px solid var(--line)" : "none" }}>
            <div style={{ marginBottom: 7 }}><FieldMeta f={r.f} /></div>
            <div style={{ fontSize: 13, lineHeight: 1.55, color: "var(--ink-soft)", marginBottom: 9, wordBreak: "break-word" }}>
              {renderUnderlined(r.f.value, r.toks)}
            </div>
            <div style={{ display: "grid", gap: 7 }}>
              {r.toks.map((t, ti) => (
                <div key={ti} style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", fontSize: 12.5 }}>
                  <span style={{ fontWeight: 700, color: "var(--red)" }}>{t.text}</span>
                  <Icon name="arrowRight" size={12} style={{ color: "var(--ink-faint)" }} />
                  {t.suggestions.length ? t.suggestions.map((s, si) => (
                    <button key={si} className="btn btn-sm" style={{ padding: "3px 9px", fontSize: 12 }} onClick={() => fixOne(r.f, t, s)}>{s}</button>
                  )) : <span style={{ fontSize: 12, color: "var(--ink-faint)", fontStyle: "italic" }}>no suggestion</span>}
                  <span style={{ width: 1, height: 16, background: "var(--line)", margin: "0 2px" }}></span>
                  {t.suggestions.length > 0 && <button className="btn btn-sm btn-ghost" style={{ padding: "3px 8px", fontSize: 11.5 }} title="Replace this word everywhere in scope" onClick={() => fixAll(t.text, t.suggestions[0])}>Fix all</button>}
                  <button className="btn btn-sm btn-ghost" style={{ padding: "3px 8px", fontSize: 11.5, color: "var(--ink-faint)" }} onClick={() => ignoreWord(t.text)}>Ignore</button>
                  <button className="btn btn-sm btn-ghost" style={{ padding: "3px 8px", fontSize: 11.5, color: "var(--ink-faint)" }} onClick={() => addDict(t.text)}>+ Dictionary</button>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function renderUnderlined(text, toks) {
  if (!toks.length) return text;
  const sorted = [...toks].sort((a, b) => a.start - b.start);
  const out = []; let last = 0;
  sorted.forEach((t, i) => {
    if (t.start > last) out.push(<span key={"n" + i}>{text.slice(last, t.start)}</span>);
    out.push(<span key={"m" + i} style={{ textDecoration: "underline wavy var(--red)", textUnderlineOffset: 3, color: "#a52727", fontWeight: 600 }}>{text.slice(t.start, t.end)}</span>);
    last = t.end;
  });
  if (last < text.length) out.push(<span key="end">{text.slice(last)}</span>);
  return out;
}

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

const AUTH_KEY = "sccl_auth";
const SESSION_DAYS = 30;

function loadAuth() {
  try {
    const raw = JSON.parse(localStorage.getItem(AUTH_KEY) || "null");
    if (!raw || !raw.loggedIn) return false;
    if (raw.expiresAt && Date.now() > raw.expiresAt) { localStorage.removeItem(AUTH_KEY); return false; }
    return true;
  } catch (e) { return false; }
}
function saveAuth() {
  const now = Date.now();
  localStorage.setItem(AUTH_KEY, JSON.stringify({
    loggedIn: true,
    loginTime: now,
    lastActive: now,
    expiresAt: now + SESSION_DAYS * 24 * 60 * 60 * 1000
  }));
}
function updateLastActive() {
  try {
    const raw = JSON.parse(localStorage.getItem(AUTH_KEY) || "null");
    if (raw && raw.loggedIn) { raw.lastActive = Date.now(); localStorage.setItem(AUTH_KEY, JSON.stringify(raw)); }

}

  const companyCampaigns = uC((companyId) =>

            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              {[["Headlines", u.headlines], ["Descriptions", u.descriptions], u.approvals ? ["Approvals", u.approvals] : null].filter(Boolean).map(([k, v]) => (
                <div key={k} style={{ flex: 1, background: "rgba(255,255,255,.08)", borderRadius: 8, padding: "8px 10px" }}>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "var(--gold)" }}>{v}</div>
                  <div style={{ fontSize: 10.5, color: "#aeb9cb" }}>{k}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ padding: "6px 10px 10px" }}>
            <div className="menu-item" onClick={() => { setOpen(false); store.signOut(); }} style={{ color: "var(--red)" }}>
              <Icon name="lock" size={15} /> <span style={{ fontWeight: 600 }}>Sign out</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Topbar({ screen, store, onNav, onMenuOpen }) {
  const D = window.LAMF_DATA;
  const meta = SCREEN_META[screen] || { crumb: "", title: "" };
  const co = D.companyById(store.activeCompany === "all" ? "sccl" : store.activeCompany);
  const coName = store.activeCompany === "all" ? "All Companies" : co.name;
  const pick = (c) => { store.setActiveCompany(c.company); const [, setC] = store.useCampaign(); setC(c.id);
    onNav("google"); };
  return (
    <div className="topbar">
      <button className="mob-menu-btn" onClick={onMenuOpen}
        style={{ display: "none", alignItems: "center", justifyContent: "center", background: "none", border: "none", padding: 6, borderRadius: 7, color: "var(--navy)", marginRight: 2 }}>
        <Icon name="menu" size={20} />
      </button>
      <div style={{ minWidth: 0 }}>
        <div className="crumb">{coName}{meta.crumb ? " · " + meta.crumb : ""}</div>
        <h1>{meta.title}</h1>
      </div>
      <div style={{ flex: 1 }}></div>
      <div className="topbar-search"><CampaignSearch store={store} onPick={pick} /></div>
      <div className="topbar-bulk"><BulkToolsButton store={store} screen={screen} /></div>
      <NotificationsBell />
      <div className="topbar-divider" style={{ width: 1, height: 26, background: "var(--line)" }}></div>
      <UserMenu store={store} />
      <style>{`
        @media(max-width:680px){.user-meta{display:none;}}
        @media(max-width:860px){
          .mob-menu-btn{display:flex !important;}
          .topbar-search{display:none;}
          .topbar-bulk{display:none;}
          .topbar-divider{display:none;}
          .topbar{padding:0 14px;}
        }
      `}</style>
    </div>
  );
}

/* ---------- login screen ---------- */
const _AK = "YWRtaW46Tm92YWMxQA=="; // base64("admin:Novac1@") — UI-level access guard
function LoginScreen({ store }) {
  const D = window.LAMF_DATA;
  const [username, setUsername] = uS("");
  const [pw, setPw] = uS("");
  const [showPw, setShowPw] = uS(false);
  const [err, setErr] = uS("");
  const [shake, setShake] = uS(false);
  const submit = (e) => {
    e && e.preventDefault();
    if (typeof btoa !== "undefined" && btoa(username.trim() + ":" + pw.trim()) === _AK) {
      setErr("");
      store.signIn();
    } else {
      setErr("Incorrect username or password.");
      setShake(true);
      setTimeout(() => setShake(false), 600);
    }
  };
  return (
    <div style={{ minHeight: "100vh", display: "grid", gridTemplateColumns: "1fr 1fr" }} className="login-wrap">
      {/* left brand panel */}
      <div style={{ background: "var(--navy-900)", color: "#fff", padding: "48px 52px", display: "flex", flexDirection: "column", justifyContent: "space-between" }} className="login-brand">
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 40, height: 40, borderRadius: 10, background: "linear-gradient(150deg, var(--gold), #b8973f)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, color: "var(--navy-900)", fontSize: 19 }}>S</div>
          <div><div style={{ fontWeight: 700, fontSize: 16 }}>SCCL Content Tool</div><div style={{ fontSize: 12, color: "var(--gold)", fontWeight: 600, letterSpacing: ".05em", textTransform: "uppercase" }}>Shriram Group</div></div>
        </div>
        <div>
          <div className="login-tagline" style={{ fontSize: 30, fontWeight: 800, lineHeight: 1.2, letterSpacing: "-.02em", marginBottom: 14 }}>One workspace for every Shriram company's content.</div>
          <div className="login-desc" style={{ fontSize: 14.5, color: "#aeb9cb", lineHeight: 1.6, maxWidth: 420 }}>Plan, write and review paid + organic + automation copy across SCCL, Shriram Financial Services, Fortune, Insights and Wealth — with compliance and tracking built in.</div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {D.companies.filter(c => !c.group).map(c => (
            <span key={c.id} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11.5, color: "#cdd6e3", background: "rgba(255,255,255,.06)", borderRadius: 20, padding: "5px 11px" }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: c.accent }}></span>{c.short}
            </span>
          ))}
        </div>
      </div>
      {/* right login form */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "40px 20px" }} className="login-right">
        <form onSubmit={submit} className="card login-card" style={{ width: 380, maxWidth: "100%", padding: 30, animation: shake ? "loginShake .5s ease" : "none" }}>
          <div style={{ fontSize: 20, fontWeight: 700, color: "var(--navy)" }}>Sign in</div>
          <div style={{ fontSize: 13, color: "var(--ink-faint)", marginBottom: 22, marginTop: 2 }}>Authorised access only.</div>
          <label className="field-label">Username</label>
          <input className="input" type="text" value={username} onChange={e => { setUsername(e.target.value); setErr(""); }}
            placeholder="username" style={{ marginBottom: 12 }} autoFocus autoComplete="username" />
          <label className="field-label">Password</label>
          <div style={{ position: "relative", marginBottom: err ? 8 : 18 }}>
            <input className="input" type={showPw ? "text" : "password"} value={pw} onChange={e => { setPw(e.target.value); setErr(""); }}
              placeholder="••••••••" style={{ paddingRight: 38 }} autoComplete="current-password" />
            <button type="button" onClick={() => setShowPw(s => !s)} tabIndex={-1}
              style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "var(--ink-faint)", cursor: "pointer", padding: 0, fontSize: 13 }}>
              {showPw ? "🙈" : "👁"}
            </button>
          </div>
          {err && <div style={{ color: "var(--red)", fontSize: 12, marginBottom: 14 }}>{err}</div>}
          <button type="submit" className="btn btn-primary" style={{ width: "100%", justifyContent: "center", padding: "10px 13px" }}>Sign in <Icon name="arrowRight" size={15} /></button>
        </form>
      </div>
      <style>{`
        .login-right { background: var(--bg); }
        @media(max-width:820px){
          /* top-bottom split on mobile — same visual DNA as desktop left-right */
          .login-wrap { grid-template-columns: 1fr !important; grid-template-rows: auto 1fr; min-height: 100vh; }
          .login-brand { justify-content: flex-start !important; gap: 16px !important; padding: 28px 24px !important; }
          .login-tagline { font-size: 20px !important; margin-bottom: 0 !important; }
          .login-desc { display: none !important; }
          .login-right { background: #fff !important; padding: 32px 20px 44px !important; align-items: flex-start !important; justify-content: flex-start !important; }
          .login-card { width: 100% !important; box-shadow: none !important; border: none !important; padding: 0 !important; }
        }
        @keyframes loginShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
      `}</style>
    </div>
  );
}

function App() {
  const store = useStore();
  const [screen, setScreen] = uS(() => (location.hash || "").replace("#", "") || "dashboard");
  const [, setCampaign] = store.useCampaign();
  const [mobileNav, setMobileNav] = uS(false);

  uE(() => { location.hash = screen; }, [screen]);
  uE(() => {
    const onHash = () => { const s = (location.hash || "").replace("#", ""); if (s && SCREEN_META[s]) setScreen(s); };
    window.addEventListener("hashchange", onHash); return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const nav = (id, campId) => {
    if (campId) setCampaign(campId);
    setScreen(id);
    document.querySelector(".content-scroll")?.scrollTo(0, 0);
  };

  const counts = {
    campaigns: store.companyCampaigns(store.activeCompany).length,
    google: store.companyCampaigns(store.activeCompany).length,
    automation: window.LAMF_DATA.automation.filter(a => store.activeCompany === "all" || a.company === store.activeCompany).length,
    compliance: store.companyCampaigns(store.activeCompany).filter(c => c.status !== "Approved" && c.status !== "Live").length,
  };

  let view;
  switch (screen) {
    case "dashboard": view = <DashboardScreen store={store} onNav={nav} />; break;
    case "campaigns": view = <CampaignsScreen store={store} onNav={nav} />; break;
    case "adgroups": view = <AdGroupsScreen store={store} onNav={nav} />; break;
    case "google": view = <GoogleSearchScreen store={store} />; break;
    case "extensions": view = <ExtensionsScreen store={store} />; break;
    case "meta": view = <MetaScreen store={store} />; break;
    case "bing": view = <BingScreen store={store} />; break;
    case "automation": view = <AutomationScreen store={store} />; break;
    case "compliance": view = <ComplianceScreen store={store} />; break;
    case "tracker": view = <TrackerScreen store={store} />; break;
    case "copybank": view = <CopyBankScreen />; break;
    case "guidelines": view = <GuidelinesScreen />; break;
    case "organic": view = <StubScreen title="Organic Social" icon="spark"
      sub="Plan & track organic posts across LinkedIn, Instagram, X, YouTube & blog for every Shriram company."
      bullets={["Content calendar across all 5 companies", "Post copy + creative brief per platform", "Approval workflow shared with Compliance", "SEO blog & long-form tracker"]} />; break;
    case "display": view = <StubScreen title="Display · Performance Max" icon="display"
      sub="Responsive Display + PMax asset groups — short headlines, long headlines, descriptions & image assets."
      bullets={["10 short headlines (≤30) + 5 long headlines (≤90)", "5 descriptions (≤90)", "Landscape, square & portrait image assets", "Auto-combination preview across placements"]} />; break;
    case "demandgen": view = <StubScreen title="Demand Gen" icon="spark"
      sub="Visually-rich Demand Gen campaigns across Discover, Gmail & YouTube feeds."
      bullets={["5 headlines (≤40) + 5 descriptions per variation", "Single image, carousel & video formats", "Discover / Gmail / YouTube preview tabs"]} />; break;
    case "settings": view = <SettingsScreen store={store} />; break;
    default: view = <DashboardScreen store={store} onNav={nav} />;
  }

  if (!store.authed) return <LoginScreen store={store} />;

  return (
    <div className="app">
      <Sidebar active={screen} onNav={nav} counts={counts} store={store} />
      {mobileNav && (
        <div className="mob-overlay" onClick={() => setMobileNav(false)}>
          <div className="mob-drawer" onClick={e => e.stopPropagation()}>
            <Sidebar active={screen} onNav={(id) => { nav(id); setMobileNav(false); }} counts={counts} store={store} />
          </div>
          <button onClick={() => setMobileNav(false)} style={{ position: "absolute", top: 14, left: 280, background: "rgba(255,255,255,.15)", border: "none", borderRadius: 8, padding: 8, color: "#fff", cursor: "pointer" }}>
            <Icon name="close" size={20} />
          </button>
        </div>
      )}
      <div className="main">
        <Topbar screen={screen} store={store} onNav={nav} onMenuOpen={() => setMobileNav(true)} />
        <div className="content-scroll">{view}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ToastProvider><App /></ToastProvider>
);

</script>

</body>
</html>

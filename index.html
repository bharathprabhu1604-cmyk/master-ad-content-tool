    </svg>

/* ---------------- char util ---------------- */
function charClass(len, limit) {
  const amber = limit <= 30 ? limit - 3 : (limit <= 90 ? limit - 5 : limit - 25);
  if (len > limit) return "red";
  if (len >= amber) return "amber";
  return "green";
}
function CharPill({ len, limit }) {
  const c = charClass(len, limit);
  return <span className={`pill pill-${c}`}>{len}/{limit}</span>;
}

/* ---------------- Status badge w/ dropdown ---------------- */
const STATUS_CLASS = {
  "Not Started": "st-notstarted", "In Progress": "st-inprogress",
  "Review": "st-review", "Approved": "st-approved", "Live": "st-live",
};
function StatusBadge({ status, onChange, size }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [open]);
  const statuses = window.LAMF_DATA.statuses;
  return (
    <span ref={ref} style={{ position: "relative", display: "inline-block" }}>
      <span className={`badge ${STATUS_CLASS[status]} ${onChange ? "clickable" : ""}`}
        style={size === "sm" ? { fontSize: 11, padding: "2px 8px" } : {}}
        onClick={onChange ? () => setOpen(o => !o) : undefined}>
        <span className="dot"></span>{status}
        {onChange && <Icon name="chevron" size={11} style={{ transform: "rotate(90deg)", opacity: .55, marginLeft: 1 }} />}
      </span>
      {open && (
        <div className="menu" style={{ top: "calc(100% + 5px)", left: 0 }}>
          {statuses.map(s => (
            <div key={s} className="menu-item" onClick={() => { onChange(s); setOpen(false); }}>
              <span className={`badge ${STATUS_CLASS[s]}`} style={{ pointerEvents: "none" }}><span className="dot"></span>{s}</span>
            </div>
          ))}
        </div>
      )}
    </span>
  );
}

/* ---------------- Toast system ---------------- */
const ToastCtx = createContext(() => {});
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, kind = "ok") => {
    const id = Math.random().toString(36).slice(2);
    setToasts(t => [...t, { id, msg, kind }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2600);
  }, []);
  return (
    <ToastCtx.Provider value={push}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.kind === "warn" ? "warn" : t.kind === "err" ? "err" : ""}`}>
            <Icon name={t.kind === "ok" ? "check" : t.kind === "warn" ? "info" : "info"} size={16}
              style={{ color: t.kind === "ok" ? "var(--gold)" : t.kind === "warn" ? "var(--amber)" : "var(--red)" }} />
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
const useToast = () => useContext(ToastCtx);

}

/* --- Google desktop ad preview --- */
function GooglePreview({ ad, mobile }) {
  const hls = ad.headlines.filter(h => h.text.trim());
  // pinned first by position, then rest
  const pinned = hls.filter(h => h.pin).sort((a, b) => a.pin - b.pin);
  const unpinned = hls.filter(h => !h.pin);
  const ordered = [];
  const used = new Set();
  for (let pos = 1; pos <= 3; pos++) {
    const p = pinned.find(h => h.pin === pos && !used.has(h));
    if (p) { ordered.push(p); used.add(p); }
    else { const u = unpinned.find(h => !used.has(h)); if (u) { ordered.push(u); used.add(u); } }
  }
  const shownHls = mobile ? ordered.slice(0, 2) : ordered.slice(0, 3);
  const descs = ad.descriptions.filter(d => d.text.trim());
  const dPin = descs.filter(d => d.pin).sort((a, b) => a.pin - b.pin);
  const dRest = descs.filter(d => !d.pin);
  const shownD = [...dPin, ...dRest].slice(0, mobile ? 1 : 2);
  const host = "shriramcredit.com";
  const path = [ad.path1, ad.path2].filter(Boolean).join("/");

  return (
    <div style={{ fontFamily: "arial, sans-serif", color: "#202124", lineHeight: 1.4 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>
        <span style={{ fontWeight: 700, fontSize: 12 }}>Sponsored</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
        <div style={{ width: 26, height: 26, borderRadius: "50%", background: "#1A2B4A", color: "#C8A951",
          display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 13, flexShrink: 0 }}>S</div>
        <div style={{ lineHeight: 1.2 }}>
          <div style={{ fontSize: 14, color: "#202124", fontWeight: 500 }}>Shriram Credit</div>
          <div style={{ fontSize: 12, color: "#5f6368" }}>{host}{path ? " › " + path : ""}</div>
        </div>
      </div>
      <div style={{ fontSize: mobile ? 18 : 20, lineHeight: 1.25, color: "#1a0dab", fontWeight: 400, marginTop: 4 }}>
        {shownHls.map((h, i) => (
          <span key={i}>
            <span style={{ color: "#1a0dab" }}>{h.text}</span>
            {i < shownHls.length - 1 && <span style={{ color: "#5f6368", fontWeight: 400 }}>{" | "}</span>}
          </span>
        ))}
        {shownHls.length === 0 && <span style={{ color: "#9aa0a6" }}>Your headlines appear here…</span>}
      </div>
      <div style={{ fontSize: 14, color: "#4d5156", marginTop: 5, ...(mobile ? { display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" } : {}) }}>
        {shownD.map(d => d.text).join(" ") || "Your descriptions appear here…"}
      </div>
      {!mobile && (
        <div style={{ display: "flex", gap: 18, marginTop: 11, flexWrap: "wrap" }}>
          {window.LAMF_DATA.sitelinks.slice(0, 4).map((s, i) => (
            <div key={i} style={{ minWidth: 120 }}>
              <div style={{ color: "#1a0dab", fontSize: 14 }}>{s[0]}</div>
              <div style={{ color: "#4d5156", fontSize: 12, lineHeight: 1.3 }}>{s[1]}</div>
            </div>
          ))}
        </div>
      )}
      {mobile && (
        <button style={{ marginTop: 10, width: "100%", border: "1px solid #1a73e8", color: "#1a73e8",
          background: "#fff", borderRadius: 18, padding: "7px 0", fontWeight: 600, fontSize: 13 }}>
          Apply Now
        </button>
      )}
    </div>
  );
}

function PhoneFrame({ children }) {
  return (
    <div style={{ width: 248, margin: "0 auto", border: "9px solid #1c2531", borderRadius: 30,
      background: "#fff", boxShadow: "var(--shadow-md)", overflow: "hidden" }}>
      <div style={{ height: 22, background: "#1c2531", display: "flex", justifyContent: "center", alignItems: "flex-start" }}>
        <div style={{ width: 60, height: 5, background: "#3a4456", borderRadius: 5, marginTop: 4 }}></div>
      </div>
      <div style={{ padding: "10px 11px 14px" }}>{children}</div>
    </div>
  );
}

function GoogleSearchScreen({ store }) {
  const D = window.LAMF_DATA;
  const toast = useToast();
  const [campId, setCampId] = store.useCampaign();
  const [variations, setVariations] = useState(1);
  const camp = store.getCampaign(campId);

  const updateHL = (i, text) => store.editCampaign(campId, c => { c.headlines[i].text = text; });
  const updateD = (i, text) => store.editCampaign(campId, c => { c.descriptions[i].text = text; });
  const pinHL = (i) => store.editCampaign(campId, c => {
    const cur = c.headlines[i].pin;
    if (cur != null) { c.headlines[i].pin = null; return; }
    const usedPins = c.headlines.filter(h => h.pin).map(h => h.pin);
    const next = [1, 2, 3].find(p => !usedPins.includes(p));
    if (!next) { toast("All 3 headline pins are in use — unpin one first", "warn"); return; }
    c.headlines[i].pin = next;
  });
  const pinD = (i) => store.editCampaign(campId, c => {
    const cur = c.descriptions[i].pin;
    if (cur != null) { c.descriptions[i].pin = null; return; }
    const usedPins = c.descriptions.filter(d => d.pin).map(d => d.pin);
    const next = [1, 2].find(p => !usedPins.includes(p));
    if (!next) { toast("Both description pins are in use — unpin one first", "warn"); return; }
    c.descriptions[i].pin = next;
  });
  const editField = (field, val) => store.editCampaign(campId, c => { c[field] = val; });

  const hlOver = camp.headlines.filter(h => h.text.length > D.limits.headline).length;
  const dOver = camp.descriptions.filter(d => d.text.length > D.limits.description).length;
  const hlFilled = camp.headlines.filter(h => h.text.trim()).length;

  const save = () => {
    const over = hlOver + dOver;
    if (over > 0) toast(`Saved — but ${over} field${over > 1 ? "s are" : " is"} over the limit`, "warn");
    else toast("Copy saved", "ok");
  };
  const copyToBing = () => { store.copyToBing(campId); toast("Ad copy duplicated to Microsoft Bing", "ok"); };

  return (
    <div className="screen-in">
      <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1.15fr) minmax(360px,.85fr)", gap: 0, alignItems: "start" }}
        className="gs-grid">
        {/* LEFT — editor */}
        <div style={{ padding: "22px 24px", borderRight: "1px solid var(--line)", minHeight: "calc(100vh - 64px)" }}>
          {/* setup */}
          <div className="card" style={{ padding: 16, marginBottom: 18 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <div style={{ gridColumn: "1 / -1" }}>
                <label className="field-label">Campaign</label>
                <select className="select" value={campId} onChange={e => setCampId(e.target.value)}>
                  {D.campaigns.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div><label className="field-label">Ad Group</label><input className="input" value={camp.adGroup} onChange={e => editField("adGroup", e.target.value)} /></div>
              <div><label className="field-label">Account</label><input className="input" value={camp.account} onChange={e => editField("account", e.target.value)} /></div>
              <div><label className="field-label">Theme / Intent</label><input className="input" value={camp.theme} onChange={e => editField("theme", e.target.value)} /></div>
              <div>
                <label className="field-label">Status</label>
                <div style={{ paddingTop: 3 }}><StatusBadge status={camp.status} onChange={s => editField("status", s)} /></div>
              </div>
              <div style={{ gridColumn: "1 / -1" }}><label className="field-label">Final URL</label><input className="input" value={camp.finalUrl} onChange={e => editField("finalUrl", e.target.value)} /></div>
              <div>
                <label className="field-label">Display Path 1 <span style={{ textTransform: "none", fontWeight: 500 }}>(≤15)</span></label>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input className="input" maxLength={20} value={camp.path1} onChange={e => editField("path1", e.target.value)} />
                  <CharPill len={camp.path1.length} limit={15} />
                </div>
              </div>
              <div>
                <label className="field-label">Display Path 2 <span style={{ textTransform: "none", fontWeight: 500 }}>(≤15)</span></label>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input className="input" maxLength={20} value={camp.path2} onChange={e => editField("path2", e.target.value)} />
                  <CharPill len={camp.path2.length} limit={15} />
                </div>
              </div>
            </div>
          </div>

          {/* headlines */}
          <SectionTitle hint={`${hlFilled} written · select up to 15 for the RSA`}
            right={<span className="badge st-review" style={{ fontSize: 11 }}><span className="dot"></span>{camp.headlines.filter(h => h.pin).length}/3 pinned</span>}>
            Headlines <span style={{ color: "var(--ink-faint)", fontWeight: 500, textTransform: "none" }}>· ≤30 chars</span>
          </SectionTitle>
          <div className="card" style={{ padding: 6, marginBottom: 18 }}>
            {camp.headlines.map((h, i) => (
              <CopyRow key={i} idx={i} prefix="HL" item={h} limit={D.limits.headline} onText={updateHL} onPin={pinHL} />
            ))}
          </div>

          {/* descriptions */}
          <SectionTitle hint="Select up to 4 for the RSA"
            right={<span className="badge st-review" style={{ fontSize: 11 }}><span className="dot"></span>{camp.descriptions.filter(d => d.pin).length}/2 pinned</span>}>
            Descriptions <span style={{ color: "var(--ink-faint)", fontWeight: 500, textTransform: "none" }}>· ≤90 chars</span>
          </SectionTitle>
          <div className="card" style={{ padding: 6, marginBottom: 18 }}>
            {camp.descriptions.map((d, i) => (
              <CopyRow key={i} idx={i} prefix="D" item={d} limit={D.limits.description} onText={updateD} onPin={pinD} multiline />
            ))}
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button className="btn" style={{ flex: 1, justifyContent: "center" }}
              onClick={() => setVariations(v => v + 1)}><Icon name="plus" size={15} /> Add New Ad Variation</button>
            <button className="btn btn-ghost" onClick={copyToBing}><Icon name="copy" size={15} /> Copy to Bing</button>
          </div>

          {variations > 1 && Array.from({ length: variations - 1 }).map((_, vi) => (
            <div key={vi} className="card" style={{ marginTop: 16, padding: 16, borderStyle: "dashed", background: "#fcfcfd" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                <span style={{ fontWeight: 700, fontSize: 13, color: "var(--navy)" }}>RSA Variation {vi + 2}</span>
                <button className="btn btn-ghost btn-sm" onClick={() => setVariations(v => v - 1)}><Icon name="trash" size={13} /> Remove</button>
              </div>
              <div className="empty-tip">New blank RSA block for <b>{camp.name}</b> — add headlines &amp; descriptions to A/B test against Variation 1. (Demo block)</div>
            </div>
          ))}
        </div>

        {/* RIGHT — previews */}
        <div style={{ padding: "22px 24px", position: "sticky", top: 64, alignSelf: "start" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "var(--navy)", textTransform: "uppercase", letterSpacing: ".02em" }}>Live Ad Preview</div>
            <button className="btn btn-primary btn-sm" onClick={save}><Icon name="check" size={14} /> Save Copy</button>
          </div>

          <div style={{ fontSize: 11, fontWeight: 600, color: "var(--ink-faint)", marginBottom: 7, textTransform: "uppercase", letterSpacing: ".05em" }}>Desktop · Google Search</div>
          <div className="card" style={{ padding: 16, marginBottom: 18 }}>
            <GooglePreview ad={camp} />
          </div>

          <div style={{ fontSize: 11, fontWeight: 600, color: "var(--ink-faint)", marginBottom: 7, textTransform: "uppercase", letterSpacing: ".05em" }}>Mobile</div>
          <div style={{ marginBottom: 20 }}>
            <PhoneFrame><GooglePreview ad={camp} mobile /></PhoneFrame>
          </div>

          {/* pinning guide */}
          <div className="card" style={{ padding: 14, background: "var(--navy)", border: "none", color: "#dfe5ee" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 10 }}>
              <Icon name="pin" size={14} style={{ color: "var(--gold)" }} fill />
              <span style={{ fontWeight: 700, fontSize: 12.5, color: "#fff", textTransform: "uppercase", letterSpacing: ".03em" }}>Pinning Guide</span>
            </div>
            {D.pinningGuide.map((p, i) => (
              <div key={i} style={{ display: "flex", gap: 9, padding: "5px 0", borderTop: i ? "1px solid rgba(255,255,255,.08)" : "none", alignItems: "baseline" }}>
                <span style={{ color: p.pinned ? "var(--gold)" : "#8a96a8", fontWeight: 700, fontSize: 12, minWidth: 74, flexShrink: 0 }}>{p.slot}</span>
                <span style={{ fontSize: 12, lineHeight: 1.4 }}>{p.rule}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <style>{`
        @media (max-width: 1080px) {
          .gs-grid { grid-template-columns: 1fr !important; }
          .gs-grid > div:first-child { border-right: none !important; border-bottom: 1px solid var(--line); min-height: 0 !important; }
          .gs-grid > div:last-child { position: static !important; }
        }
      `}</style>
    </div>
  );
}

Object.assign(window, { GoogleSearchScreen, GooglePreview });
</script>
<script type="text/babel">
/* SCREEN 1 — Dashboard. */
const CHANNEL_ICON = { google: "search", meta: "facebook", bing: "bing" };

function StatCard({ label, value, sub, icon, accent }) {
  return (
    <div className="card" style={{ padding: "16px 18px", display: "flex", flexDirection: "column", gap: 2 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <span style={{ fontSize: 12, fontWeight: 600, color: "var(--ink-soft)" }}>{label}</span>
        <div style={{ width: 30, height: 30, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center",
          background: accent === "gold" ? "var(--gold-tint)" : "#eef1f6", color: accent === "gold" ? "var(--gold)" : "var(--navy)" }}>
          <Icon name={icon} size={16} />
        </div>
      </div>
      <div style={{ fontSize: 28, fontWeight: 800, letterSpacing: "-.02em", color: "var(--navy)", lineHeight: 1.1 }}>{value}</div>
      <div style={{ fontSize: 12, color: "var(--ink-faint)" }}>{sub}</div>
    </div>
  );
}

function progressOf(camp, D) {
  const filled = camp.headlines.filter(h => h.text.trim()).length;
  return Math.round((filled / 15) * 100);
}

function CampaignCard({ camp, onNav, onStatus, store }) {
  const D = window.LAMF_DATA;
  const pct = progressOf(camp, D);
  const filled = camp.headlines.filter(h => h.text.trim()).length;
  return (
    <div className="card" style={{ padding: 0, overflow: "hidden", display: "flex", flexDirection: "column", transition: "box-shadow .15s, transform .15s" }}
      onMouseEnter={e => { e.currentTarget.style.boxShadow = "var(--shadow-md)"; e.currentTarget.style.transform = "translateY(-2px)"; }}
      onMouseLeave={e => { e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.transform = "none"; }}>
      <div style={{ padding: "15px 16px 12px", display: "flex", flexDirection: "column", gap: 10, flex: 1 }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <div style={{ width: 32, height: 32, borderRadius: 8, background: "#eef1f6", color: "var(--blue)",
              display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              <Icon name="search" size={16} />
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 14, color: "var(--navy)", letterSpacing: "-.01em" }}>{camp.name}</div>
              <div style={{ fontSize: 11.5, color: "var(--ink-faint)" }}>Google Search · RSA</div>
            </div>
          </div>
          <StatusBadge status={camp.status} onChange={s => onStatus(camp.id, s)} size="sm" />
        </div>

        <div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, marginBottom: 5, color: "var(--ink-soft)" }}>
            <span>Headlines written</span>
            <span style={{ fontFamily: "var(--mono)", fontWeight: 500 }}>{filled}/15</span>
          </div>
          <div style={{ height: 6, background: "#eef0f3", borderRadius: 4, overflow: "hidden" }}>
            <div style={{ width: pct + "%", height: "100%", borderRadius: 4,
              background: pct >= 100 ? "var(--green)" : "linear-gradient(90deg, var(--navy), var(--navy-600))", transition: "width .4s" }}></div>
          </div>
        </div>
      </div>
      <div style={{ display: "flex", borderTop: "1px solid var(--line)" }}>
        <button className="cardact" onClick={() => onNav("google", camp.id)}><Icon name="edit" size={14} /> Edit Copy</button>
        <button className="cardact" onClick={() => onNav("google", camp.id)}><Icon name="eye" size={14} /> Preview</button>
        <button className="cardact" onClick={() => onNav("compliance")}><Icon name="send" size={14} /> Compliance</button>
      </div>
      <style>{`.cardact{flex:1;border:none;background:#fff;padding:9px 4px;font-size:12px;font-weight:600;color:var(--ink-soft);
        display:flex;align-items:center;justify-content:center;gap:5px;border-right:1px solid var(--line);transition:background .12s;}
        .cardact:last-child{border-right:none;} .cardact:hover{background:#f5f6f8;color:var(--navy);}`}</style>
    </div>
  );
}

function DashboardScreen({ store, onNav }) {
  const D = window.LAMF_DATA;
  const camps = store.campaigns;
  const totalHL = camps.reduce((n, c) => n + c.headlines.filter(h => h.text.trim()).length, 0);
  const totalD = camps.reduce((n, c) => n + c.descriptions.filter(d => d.text.trim()).length, 0);
  const approved = camps.filter(c => c.status === "Approved" || c.status === "Live").length;
  const pending = camps.length - approved;

  const activity = [
    { who: "Priya Nair", act: "edited headlines on", what: "Personal Loan Intercept", when: "12 min ago", icon: "edit" },
    { who: "A. Mehta", act: "approved extensions for", what: "All Campaigns", when: "1 hr ago", icon: "check" },
    { who: "Rohan Das", act: "sent for review", what: "Low-Interest Loan", when: "3 hrs ago", icon: "send" },
    { who: "Sara Iyer", act: "added 5 callouts to", what: "Copy Bank", when: "Yesterday", icon: "plus" },
    { who: "System", act: "flagged 2 headlines over limit on", what: "Instant Cash", when: "Yesterday", icon: "info" },
  ];

  return (
    <div className="screen-in" style={{ padding: "24px 28px", maxWidth: 1380, margin: "0 auto" }}>

          {/* stats */}

          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
            <div>
              <div style={{ fontSize: 17, fontWeight: 700, color: "var(--navy)", letterSpacing: "-.01em" }}>Campaigns</div>
              <div style={{ fontSize: 12.5, color: "var(--ink-faint)" }}>LAMF @ 10.5%* p.a. · Loan Against Mutual Funds</div>
            </div>
            <button className="btn btn-primary btn-sm" onClick={() => onNav("google")}><Icon name="plus" size={14} /> New Campaign</button>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 14 }}>

          </div>
        </div>

        {/* right rail */}
        <div style={{ display: "flex", flexDirection: "column", gap: 18, position: "sticky", top: 88 }} className="dash-rail">
          {/* compliance summary */}
          <div className="card" style={{ padding: 16 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "var(--navy)", marginBottom: 12, textTransform: "uppercase", letterSpacing: ".03em" }}>Compliance Summary</div>
            {D.statuses.map(s => {
              const n = camps.filter(c => c.status === s).length;
              return (
                <div key={s} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 0" }}>
                  <StatusBadge status={s} size="sm" />
                  <span style={{ fontFamily: "var(--mono)", fontWeight: 600, fontSize: 13, color: n ? "var(--navy)" : "var(--ink-faint)" }}>{n}</span>
                </div>
              );
            })}
            <button className="btn btn-sm" style={{ width: "100%", justifyContent: "center", marginTop: 12 }} onClick={() => onNav("compliance")}>
              <Icon name="compliance" size={14} /> Open Compliance Review
            </button>
          </div>

          {/* activity */}
          <div className="card" style={{ padding: 16 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: "var(--navy)", marginBottom: 12, textTransform: "uppercase", letterSpacing: ".03em" }}>Activity Feed</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {activity.map((a, i) => (
                <div key={i} style={{ display: "flex", gap: 10, padding: "8px 0", borderTop: i ? "1px solid var(--line)" : "none" }}>
                  <div style={{ width: 26, height: 26, borderRadius: 7, background: "#eef1f6", color: "var(--navy)", flexShrink: 0,
                    display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name={a.icon} size={13} /></div>
                  <div style={{ fontSize: 12.5, lineHeight: 1.45 }}>
                    <b style={{ color: "var(--navy)" }}>{a.who}</b> <span style={{ color: "var(--ink-soft)" }}>{a.act}</span> <b style={{ color: "var(--ink)" }}>{a.what}</b>
                    <div style={{ fontSize: 11, color: "var(--ink-faint)", marginTop: 1 }}>{a.when}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      <style>{`@media (max-width: 1080px){ .dash-grid{grid-template-columns:1fr !important;} .dash-rail{position:static !important;}
        .stat-grid{grid-template-columns:repeat(2,1fr) !important;} }`}</style>
    </div>
  );
}

Object.assign(window, { DashboardScreen });
</script>
<script type="text/babel">
/* Remaining screens: Extensions, Meta, Bing, Compliance, Tracker, CopyBank, Guidelines, + stubs. */

/* ---------- shared page wrapper ---------- */
function Page({ children, max = 1380, pad = "24px 28px" }) {
  return <div className="screen-in" style={{ padding: pad, maxWidth: max, margin: "0 auto" }}>{children}</div>;
}
function PageHead({ title, sub, actions }) {

/* ================= SCREEN 5 — BING (reuses Google preview) ================= */
function BingPreview({ ad }) {
  const hls = ad.headlines.filter(h => h.text.trim());
  const pinned = hls.filter(h => h.pin).sort((a, b) => a.pin - b.pin);
  const rest = hls.filter(h => !h.pin);
  const shown = [...pinned, ...rest].slice(0, 3);
  const descs = ad.descriptions.filter(d => d.text.trim());
  const path = [ad.path1, ad.path2].filter(Boolean).join("/");
  return (
    <div style={{ fontFamily: "'Segoe UI', arial, sans-serif", color: "#202124" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, fontSize: 12, color: "#5f6368" }}>
        <span style={{ fontWeight: 700, color: "#0078D4" }}>Ad</span>
        <span>·</span><span>shriramcredit.com{path ? "/" + path : ""}</span>
      </div>
      <div style={{ fontSize: 19, color: "#0078D4", lineHeight: 1.25 }}>
        {shown.map((h, i) => <span key={i}>{h.text}{i < shown.length - 1 ? <span style={{ color: "#5f6368" }}> | </span> : ""}</span>)}
        {shown.length === 0 && <span style={{ color: "#9aa0a6" }}>Headlines appear here…</span>}
      </div>
      <div style={{ fontSize: 14, color: "#4d5156", marginTop: 5 }}>{descs.slice(0, 2).map(d => d.text).join(" ") || "Descriptions appear here…"}</div>
    </div>
  );
}

<script type="text/babel">

/* ================= SCREEN 6 — COMPLIANCE REVIEW ================= */
function ComplianceScreen({ store }) {
  const D = window.LAMF_DATA;
  const toast = useToast();
  const camps = store.campaigns.slice(0, 5);
  const today = new Date().toLocaleDateString("en-IN", { day: "numeric", month: "long", year: "numeric" });
  const rows = [];
  for (let i = 0; i < 15; i++) rows.push({ key: "HL" + (i + 1), type: "hl", i });
  for (let i = 0; i < 4; i++) rows.push({ key: "D" + (i + 1), type: "d", i });

  const verdicts = store.compliance;
  const setVerdict = (campId, rowKey, v) => store.setCompliance(campId, rowKey, v);
  const counts = { Approved: 0, Rejected: 0, Pending: 0 };
  camps.forEach(c => rows.forEach(r => {
    const v = (verdicts[c.id] || {})[r.key] || "Pending";
    counts[v] = (counts[v] || 0) + 1;
  }));

  const cellOf = (camp, r) => {
    const item = r.type === "hl" ? camp.headlines[r.i] : camp.descriptions[r.i];
    if (!item) return { text: "—", len: 0, pinned: false };
    return { text: item.text, len: item.text.length, pinned: item.pin != null };
  };
  const limit = (t) => t === "hl" ? 30 : 90;
  const VOPTS = ["Pending", "Approved", "Rejected", "Changes"];
  const vColor = { Pending: "#5b6573", Approved: "var(--green)", Rejected: "var(--red)", Changes: "var(--amber)" };

  return (
    <Page max={1600}>
      <div className="no-print">
        <PageHead title="Compliance Review — LAMF Ad Copy" sub={`Shriram Credit · SEBI & RBI Regulated NBFC · ${today}`}
          actions={<>
            <button className="btn" onClick={() => toast("Draft emailed to compliance@shriramcredit.com", "ok")}><Icon name="mail" size={15} /> Email to Compliance</button>
            <button className="btn btn-gold" onClick={() => window.print()}><Icon name="download" size={15} /> Export PDF</button>
          </>} />
        <div style={{ background: "var(--gold-tint)", border: "1px solid var(--gold-soft)", borderRadius: 10, padding: "12px 16px", marginBottom: 18, fontSize: 13, color: "#7a6526", display: "flex", gap: 10, alignItems: "center" }}>
          <Icon name="info" size={16} style={{ color: "var(--gold)", flexShrink: 0 }} />
          Please review all copy below and mark each row <b>Approved</b>, <b>Rejected</b>, or <b>Changes Required</b>. Pinned (★ gold) rows are mandatory placements. Status syncs back to the Dashboard.
        </div>
      </div>

      <div className="print-head" style={{ display: "none" }}>
        <h2 style={{ margin: 0 }}>COMPLIANCE REVIEW — LAMF Ad Copy</h2>
        <p style={{ margin: "2px 0 14px", color: "#555" }}>Shriram Credit · SEBI &amp; RBI Regulated NBFC · {today}</p>
      </div>

      <div className="card" style={{ overflow: "auto" }}>
        <table className="comp-tbl">
          <thead><tr>
            <th style={{ position: "sticky", left: 0, zIndex: 2, background: "#f7f8fa", minWidth: 56 }}>Row</th>
            {camps.map(c => <th key={c.id} style={{ minWidth: 220 }}>{c.name}</th>)}
            <th style={{ minWidth: 130 }}>Verdict (all)</th><th style={{ minWidth: 160 }}>Notes</th>
          </tr></thead>
          <tbody>
            {rows.map(r => {
              const anyPinned = camps.some(c => cellOf(c, r).pinned);
              return (
                <tr key={r.key} style={anyPinned ? { background: "var(--gold-tint)" } : {}}>
                  <td style={{ position: "sticky", left: 0, background: anyPinned ? "#faf3df" : "#fff", fontWeight: 700, fontFamily: "var(--mono)", fontSize: 12, color: anyPinned ? "var(--gold)" : "var(--ink-soft)" }}>
                    {anyPinned && "★ "}{r.key}
                  </td>
                  {camps.map(c => {
                    const cell = cellOf(c, r);
                    return (
                      <td key={c.id}>
                        <div style={{ fontSize: 12.5, lineHeight: 1.4, color: cell.text === "—" ? "var(--ink-faint)" : "var(--ink)" }}>{cell.text || "—"}</div>
                        {cell.text !== "—" && <span style={{ marginTop: 3, display: "inline-block" }}><CharPill len={cell.len} limit={limit(r.type)} /></span>}
                      </td>
                    );
                  })}
                  <td>
                    <select className="select no-print" style={{ fontSize: 12, padding: "5px 22px 5px 8px" }}
                      value={(verdicts.all || {})[r.key] || "Pending"}
                      onChange={e => { const v = e.target.value; camps.forEach(c => setVerdict(c.id, r.key, v)); store.setCompliance("all", r.key, v); }}>
                      {VOPTS.map(v => <option key={v}>{v}</option>)}
                    </select>
                  </td>
                  <td><input className="input no-print" placeholder="Add note…" style={{ fontSize: 12, padding: "5px 8px" }} /></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

        .trk-tbl tr:last-child td{border-bottom:none;} .trk-tbl tbody tr:hover{background:#fafbfc;}`}</style>

}

function StubScreen({ title, sub, icon, bullets }) {
  return (

Object.assign(window, { ComplianceScreen, TrackerScreen, CopyBankScreen, GuidelinesScreen, StubScreen });
</script>
<script type="text/babel">
/* App store (state + localStorage), topbar, routing, mount. */
const { useState: uS, useEffect: uE, useRef: uR, useCallback: uC, useMemo } = React;
const LS_KEY = "lamf_tool_v1";

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

function useStore() {
  const D = window.LAMF_DATA;
  const [campaigns, setCampaigns] = uS(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(LS_KEY) || "null");
      if (saved && saved.campaigns) return saved.campaigns;
    } catch (e) {}
    return deepClone(D.campaigns);
  });
  const [compliance, setCompliance] = uS(() => {
    try { const s = JSON.parse(localStorage.getItem(LS_KEY) || "null"); if (s && s.compliance) return s.compliance; } catch (e) {}
    return {};
  });
  const [tracker, setTracker] = uS(() => {
    try { const s = JSON.parse(localStorage.getItem(LS_KEY) || "null"); if (s && s.tracker) return s.tracker; } catch (e) {}
    return null;
  });
  const [activeCampaign, setActiveCampaign] = uS(campaigns[0].id);
  const bingFromRef = uR(null);

  // persist
  uE(() => {
    const t = setTimeout(() => {
      localStorage.setItem(LS_KEY, JSON.stringify({ campaigns, compliance, tracker }));
    }, 200);
    return () => clearTimeout(t);
  }, [campaigns, compliance, tracker]);

  const getCampaign = uC(id => campaigns.find(c => c.id === id) || campaigns[0], [campaigns]);
  const editCampaign = uC((id, fn) => {
    setCampaigns(cs => cs.map(c => {
      if (c.id !== id) return c;
      const copy = deepClone(c); fn(copy); return copy;
    }));
  }, []);
  const copyToBing = uC(id => { bingFromRef.current = id; }, []);

  const trackerRows = uC(() => {
    if (tracker) return tracker;
    return D.tracker.map(r => ({ id: r[0], channel: r[1], type: r[2], campaign: r[3], unit: r[4], assignee: r[5], due: r[6], status: r[7], reviewer: r[8] }));
  }, [tracker]);
  const saveTracker = uC(rows => setTracker(rows), []);

  const setComplianceVal = uC((campId, rowKey, v) => {
    setCompliance(c => ({ ...c, [campId]: { ...(c[campId] || {}), [rowKey]: v } }));
  }, []);

  const resetAll = uC(() => {
    localStorage.removeItem(LS_KEY);
    setCampaigns(deepClone(D.campaigns)); setCompliance({}); setTracker(null);
  }, []);

  return {
    campaigns, getCampaign, editCampaign, copyToBing, bingFrom: bingFromRef.current,
    compliance, setCompliance: setComplianceVal,
    trackerRows, saveTracker, resetAll,
    useCampaign: () => [activeCampaign, setActiveCampaign],
  };
}

const SCREEN_META = {
  dashboard: { crumb: "Overview", title: "Dashboard" },
  google: { crumb: "Channels · Google", title: "Google Search Ad Writer" },
  extensions: { crumb: "Channels · Google", title: "Ad Extensions" },
  display: { crumb: "Channels · Google", title: "Display · Performance Max" },
  demandgen: { crumb: "Channels · Google", title: "Demand Gen" },
  meta: { crumb: "Channels · Meta", title: "Facebook + Instagram" },
  bing: { crumb: "Channels · Microsoft", title: "Bing Ad Writer" },
  compliance: { crumb: "Review", title: "Compliance Review" },
  tracker: { crumb: "Review", title: "Content Tracker" },
  copybank: { crumb: "Resources", title: "Copy Bank" },
  guidelines: { crumb: "Resources", title: "Guidelines" },
  settings: { crumb: "Account", title: "Settings" },
};

function Topbar({ screen, store }) {
  const D = window.LAMF_DATA;
  const meta = SCREEN_META[screen] || { crumb: "", title: "" };
  return (
    <div className="topbar">
      <div style={{ flex: 1, minWidth: 0 }}>
        <div className="crumb">Shriram Credit · LAMF{meta.crumb ? " · " + meta.crumb : ""}</div>
        <h1>{meta.title}</h1>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 7, background: "var(--gold-tint)", border: "1px solid var(--gold-soft)",
          borderRadius: 20, padding: "5px 12px", fontSize: 12.5, fontWeight: 600, color: "#7a6526" }}>
          <span style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--gold)" }}></span>
          LAMF @ 10.5%* p.a.
        </div>
        <button className="btn btn-ghost btn-sm" title="Notifications" style={{ padding: 8 }}><Icon name="bell" size={17} /></button>
        <div style={{ width: 1, height: 24, background: "var(--line)" }}></div>
        <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
          <div style={{ width: 32, height: 32, borderRadius: "50%", background: "var(--navy)", color: "#fff",
            display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13 }}>PN</div>
          <div style={{ lineHeight: 1.2 }} className="user-meta">
            <div style={{ fontWeight: 600, fontSize: 13 }}>Priya Nair</div>
            <div style={{ fontSize: 11, color: "var(--ink-faint)" }}>Content Lead</div>
          </div>
        </div>
      </div>
      <style>{`@media(max-width:600px){.user-meta{display:none;}}`}</style>
    </div>
  );
}

function App() {
  const store = useStore();
  const [screen, setScreen] = uS(() => (location.hash || "").replace("#", "") || "google");
  const [, setCampaign] = store.useCampaign();

  uE(() => { location.hash = screen; }, [screen]);
  uE(() => {
    const onHash = () => { const s = (location.hash || "").replace("#", ""); if (s && SCREEN_META[s]) setScreen(s); };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const nav = (id, campId) => {
    if (campId) setCampaign(campId);
    setScreen(id);
    document.querySelector(".content-scroll")?.scrollTo(0, 0);
  };

  const counts = {
    google: store.campaigns.length,
    compliance: store.campaigns.filter(c => c.status !== "Approved" && c.status !== "Live").length,
    tracker: store.trackerRows().length,
  };

  let view;
  switch (screen) {
    case "dashboard": view = <DashboardScreen store={store} onNav={nav} />; break;
    case "google": view = <GoogleSearchScreen store={store} />; break;
    case "extensions": view = <ExtensionsScreen store={store} />; break;
    case "meta": view = <MetaScreen store={store} />; break;
    case "bing": view = <BingScreen store={store} />; break;
    case "compliance": view = <ComplianceScreen store={store} />; break;
    case "tracker": view = <TrackerScreen store={store} />; break;
    case "copybank": view = <CopyBankScreen />; break;
    case "guidelines": view = <GuidelinesScreen />; break;
    case "display": view = <StubScreen title="Display · Performance Max" icon="display"
      sub="Responsive Display + PMax asset groups — short headlines, long headlines, descriptions & image assets."
      bullets={["10 short headlines (≤30) + 5 long headlines (≤90)", "5 descriptions (≤90)", "Landscape, square & portrait image assets", "Auto-combination preview across placements"]} />; break;
    case "demandgen": view = <StubScreen title="Demand Gen" icon="spark"
      sub="Visually-rich Demand Gen campaigns across Discover, Gmail & YouTube feeds."
      bullets={["5 headlines (≤40) + 5 descriptions per variation", "Single image, carousel & video formats", "Discover / Gmail / YouTube preview tabs"]} />; break;
    case "settings": view = <StubScreen title="Settings" icon="settings"
      sub="Workspace, team, brand defaults & data."
      bullets={["Team members & role permissions", "Brand voice & compliance defaults", "Default rate, regulator & disclaimer text", "Export & integration settings"]} />; break;
    default: view = <DashboardScreen store={store} onNav={nav} />;
  }

  // settings reset button hook (small extra)
  return (
    <div className="app">
      <Sidebar active={screen} onNav={nav} counts={counts} />
      <div className="main">
        <Topbar screen={screen} store={store} />
        <div className="content-scroll">{view}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ToastProvider><App /></ToastProvider>
);
</script>
</body></html>
